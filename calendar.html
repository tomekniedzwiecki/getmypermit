<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalendarz - GetMyPermit</title>
    <meta name="theme-color" content="#050505">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #050505; color: #e5e5e5; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::selection { background: white; color: black; }

        .glass-header {
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter { animation: fadeIn 0.4s ease-out forwards; }

        .input-field {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: rgba(255,255,255,0.25);
            outline: none;
        }

        .calendar-day {
            min-height: 100px;
            transition: all 0.15s;
        }
        .calendar-day:hover {
            background: rgba(255,255,255,0.03);
        }
        .calendar-day.today {
            background: rgba(255,255,255,0.05);
        }
        .calendar-day.other-month {
            opacity: 0.3;
        }

        .event-item {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 2px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .event-item:hover {
            filter: brightness(1.1);
        }
        .event-item.meeting {
            background: rgba(59, 130, 246, 0.2);
            border-left: 2px solid #3b82f6;
            color: #93c5fd;
        }
        .event-item.hearing {
            background: rgba(239, 68, 68, 0.2);
            border-left: 2px solid #ef4444;
            color: #fca5a5;
        }
        .event-item.deadline {
            background: rgba(34, 211, 238, 0.15);
            border-left: 2px solid #22d3ee;
            color: #67e8f9;
        }
        .event-item.consultation {
            background: rgba(16, 185, 129, 0.2);
            border-left: 2px solid #10b981;
            color: #6ee7b7;
        }

        .view-btn {
            transition: all 0.15s;
        }
        .view-btn.active {
            background: white;
            color: black;
        }

        .week-hour-row {
            height: 60px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .lead-search-dropdown {
            max-height: 240px;
            overflow-y: auto;
        }
        .lead-search-item {
            transition: all 0.1s;
        }
        .lead-search-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .sidebar-link {
            transition: all 0.2s;
        }
        .sidebar-link:hover {
            background: rgba(255,255,255,0.05);
        }
        .sidebar-link.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
    </style>
</head>
<body class="h-screen font-sans text-sm tracking-tight antialiased overflow-hidden">

    <script>
        // ===========================================
        // CONFIGURATION - GMP SPECIFIC
        // ===========================================
        const SUPABASE_URL = 'https://gfwsdrbywgmceateubyq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdmd3NkcmJ5d2dtY2VhdGV1YnlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0Mzg1MjksImV4cCI6MjA5MjAxNDUyOX0.Qnn4MbtfApJ8sVwkpXNqNoHCBcGymS2U04kRLIVRta0';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Table names - GMP prefixed for isolation
        const TABLE_EVENTS = 'gmp_calendar_events';
        const TABLE_LAWYERS = 'gmp_lawyers';
        const TABLE_LEADS = 'permit_leads';

        // State
        let currentDate = new Date();
        let currentView = 'month';
        let events = [];
        let leads = [];
        let lawyers = [];
        let lawyersMap = {};
        let selectedLawyerId = null;
        let selectedDuration = 30;
        let selectedEventType = 'meeting';

        // ===========================================
        // AUTH
        // ===========================================
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'index.html';
                return null;
            }
            return session;
        }

        // ===========================================
        // DATA LOADING
        // ===========================================
        async function loadLawyers() {
            const { data, error } = await supabaseClient
                .from(TABLE_LAWYERS)
                .select('*')
                .eq('is_active', true)
                .order('name');

            if (error) {
                console.error('Error loading lawyers:', error);
                return;
            }

            lawyers = data || [];
            lawyersMap = {};
            lawyers.forEach(l => lawyersMap[l.id] = l);

            // Populate selector
            const selector = document.getElementById('lawyer-selector');
            selector.innerHTML = '<option value="">Wszyscy prawnicy</option>' +
                lawyers.map(l => `<option value="${l.id}">${escapeHtml(l.name)}</option>`).join('');

            // Populate event form
            const eventSelect = document.getElementById('event-assigned');
            eventSelect.innerHTML = '<option value="">-- Wybierz prawnika --</option>' +
                lawyers.map(l => `<option value="${l.id}">${escapeHtml(l.name)}</option>`).join('');
        }

        async function loadLeads() {
            const { data, error } = await supabaseClient
                .from(TABLE_LEADS)
                .select('id, name, email, phone, permit_type')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error loading leads:', error);
                return;
            }

            leads = (data || []).map(l => ({
                ...l,
                name: l.name || l.email
            }));
        }

        async function loadEvents() {
            let startDate, endDate;

            if (currentView === 'month') {
                startDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
                endDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0, 23, 59, 59);
            } else if (currentView === 'week') {
                const weekStart = getWeekStart(currentDate);
                startDate = weekStart;
                endDate = new Date(weekStart);
                endDate.setDate(endDate.getDate() + 6);
                endDate.setHours(23, 59, 59);
            } else {
                startDate = new Date(currentDate);
                startDate.setHours(0, 0, 0, 0);
                endDate = new Date(currentDate);
                endDate.setHours(23, 59, 59, 999);
            }

            let query = supabaseClient
                .from(TABLE_EVENTS)
                .select(`*, ${TABLE_LEADS}(id, name, email)`)
                .lte('start_time', endDate.toISOString())
                .gte('end_time', startDate.toISOString());

            if (selectedLawyerId) {
                query = query.eq('assigned_to', selectedLawyerId);
            }

            const { data, error } = await query.order('start_time');

            if (error) {
                console.error('Error loading events:', error);
                return;
            }

            events = (data || []).map(e => ({
                id: e.id,
                title: e.title,
                description: e.description,
                start: e.start_time,
                end: e.end_time,
                lead_id: e.lead_id,
                lead: e[TABLE_LEADS],
                assigned_to: e.assigned_to,
                event_type: e.event_type || 'meeting',
                location: e.location
            }));

            renderCurrentView();
            renderUpcomingEvents();
        }

        // ===========================================
        // VIEW MANAGEMENT
        // ===========================================
        function getWeekStart(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            d.setDate(diff);
            d.setHours(0, 0, 0, 0);
            return d;
        }

        function renderCurrentView() {
            document.getElementById('month-view').classList.toggle('hidden', currentView !== 'month');
            document.getElementById('week-view').classList.toggle('hidden', currentView !== 'week');
            document.getElementById('day-view').classList.toggle('hidden', currentView !== 'day');

            if (currentView === 'month') renderMonthView();
            else if (currentView === 'week') renderWeekView();
            else renderDayView();

            updatePeriodLabel();
        }

        function updatePeriodLabel() {
            const monthNames = ['Styczeń', 'Luty', 'Marzec', 'Kwiecień', 'Maj', 'Czerwiec',
                               'Lipiec', 'Sierpień', 'Wrzesień', 'Październik', 'Listopad', 'Grudzień'];
            const dayNames = ['Niedziela', 'Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek', 'Sobota'];

            let label = '';
            if (currentView === 'month') {
                label = `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
            } else if (currentView === 'week') {
                const weekStart = getWeekStart(currentDate);
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekEnd.getDate() + 6);
                label = `${weekStart.getDate()} - ${weekEnd.getDate()} ${monthNames[weekStart.getMonth()]} ${weekStart.getFullYear()}`;
            } else {
                label = `${dayNames[currentDate.getDay()]}, ${currentDate.getDate()} ${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
            }

            document.getElementById('current-period').textContent = label;
        }

        function renderMonthView() {
            const grid = document.getElementById('calendar-grid');
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            let firstDay = new Date(year, month, 1).getDay();
            firstDay = firstDay === 0 ? 6 : firstDay - 1;

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            const today = new Date();
            let html = '';
            let dayCount = 1;
            let nextMonthDay = 1;

            for (let row = 0; row < 6; row++) {
                for (let col = 0; col < 7; col++) {
                    const cellIndex = row * 7 + col;
                    let dayNum, isOtherMonth = false, cellDate;

                    if (cellIndex < firstDay) {
                        dayNum = daysInPrevMonth - firstDay + cellIndex + 1;
                        isOtherMonth = true;
                        cellDate = new Date(year, month - 1, dayNum);
                    } else if (dayCount > daysInMonth) {
                        dayNum = nextMonthDay++;
                        isOtherMonth = true;
                        cellDate = new Date(year, month + 1, dayNum);
                    } else {
                        dayNum = dayCount++;
                        cellDate = new Date(year, month, dayNum);
                    }

                    const isToday = cellDate.toDateString() === today.toDateString();
                    const isWeekend = col >= 5;
                    const dateStr = cellDate.toISOString().split('T')[0];

                    const dayEvents = events.filter(e => {
                        const eventDate = new Date(e.start);
                        return eventDate.toDateString() === cellDate.toDateString();
                    });

                    html += `
                        <div class="calendar-day p-2 border-b border-r border-white/5 ${isOtherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''} ${isWeekend ? 'bg-zinc-900/30' : ''}" data-date="${dateStr}">
                            <div class="text-xs ${isToday ? 'bg-white text-black w-6 h-6 rounded-full flex items-center justify-center font-semibold' : 'text-zinc-400 mb-1'}">${dayNum}</div>
                            <div class="space-y-0.5 mt-1">
                                ${dayEvents.slice(0, 3).map(e => `
                                    <div class="event-item ${e.event_type}" onclick="openEventModal('${e.id}')" title="${escapeHtml(e.title)}">
                                        ${formatEventTime(e.start)} ${escapeHtml(e.title)}
                                    </div>
                                `).join('')}
                                ${dayEvents.length > 3 ? `<div class="text-[10px] text-zinc-500 pl-1">+${dayEvents.length - 3} więcej</div>` : ''}
                            </div>
                        </div>
                    `;
                }

                if (dayCount > daysInMonth && (row + 1) * 7 >= firstDay + daysInMonth) break;
            }

            grid.innerHTML = html;
        }

        function renderWeekView() {
            const weekStart = getWeekStart(currentDate);
            const dayNames = ['Pon', 'Wt', 'Śr', 'Czw', 'Pt', 'Sob', 'Ndz'];
            const today = new Date();

            let headerHtml = '<div class="px-2 py-3 text-center text-zinc-600 text-xs font-medium border-r border-white/5"></div>';
            for (let i = 0; i < 7; i++) {
                const dayDate = new Date(weekStart);
                dayDate.setDate(dayDate.getDate() + i);
                const isToday = dayDate.toDateString() === today.toDateString();
                const isWeekend = i >= 5;

                headerHtml += `
                    <div class="px-2 py-3 text-center border-r border-white/5 last:border-r-0 ${isWeekend ? 'bg-zinc-900/30' : ''} ${isToday ? 'bg-white/5' : ''}">
                        <div class="text-zinc-500 text-[10px] font-medium uppercase tracking-wider">${dayNames[i]}</div>
                        <div class="text-lg font-semibold ${isToday ? 'text-white' : 'text-zinc-400'}">${dayDate.getDate()}</div>
                    </div>
                `;
            }
            document.getElementById('week-header').innerHTML = headerHtml;
            document.getElementById('week-header').className = 'grid grid-cols-8 bg-zinc-900/80 border-b border-white/5';

            let gridHtml = '';
            for (let hour = 6; hour < 22; hour++) {
                gridHtml += `<div class="grid grid-cols-8 week-hour-row">`;
                gridHtml += `<div class="px-2 py-1 text-right text-zinc-600 text-[10px] font-mono border-r border-white/5">${hour.toString().padStart(2, '0')}:00</div>`;

                for (let day = 0; day < 7; day++) {
                    const dayDate = new Date(weekStart);
                    dayDate.setDate(dayDate.getDate() + day);
                    const isWeekend = day >= 5;

                    const hourEvents = events.filter(e => {
                        const eventStart = new Date(e.start);
                        return eventStart.toDateString() === dayDate.toDateString() && eventStart.getHours() === hour;
                    });

                    gridHtml += `
                        <div class="border-r border-white/5 last:border-r-0 p-0.5 ${isWeekend ? 'bg-zinc-900/30' : ''} relative">
                            ${hourEvents.map(e => `
                                <div class="event-item ${e.event_type} text-[10px] cursor-pointer" onclick="openEventModal('${e.id}')" title="${escapeHtml(e.title)}">
                                    ${escapeHtml(e.title)}
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                gridHtml += `</div>`;
            }

            document.getElementById('week-grid').innerHTML = gridHtml;
        }

        function renderDayView() {
            const dayNames = ['Niedziela', 'Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek', 'Sobota'];
            const monthNames = ['stycznia', 'lutego', 'marca', 'kwietnia', 'maja', 'czerwca',
                               'lipca', 'sierpnia', 'września', 'października', 'listopada', 'grudnia'];

            document.getElementById('day-title').textContent = `${dayNames[currentDate.getDay()]}, ${currentDate.getDate()} ${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

            let gridHtml = '';
            for (let hour = 6; hour < 22; hour++) {
                const hourEvents = events.filter(e => {
                    const eventDate = new Date(e.start);
                    return eventDate.toDateString() === currentDate.toDateString() && eventDate.getHours() === hour;
                });

                gridHtml += `
                    <div class="grid grid-cols-12 gap-4 border-b border-white/5 min-h-[80px]">
                        <div class="col-span-1 px-4 py-2 text-right text-zinc-500 text-xs font-mono">${hour.toString().padStart(2, '0')}:00</div>
                        <div class="col-span-11 p-2 border-l border-white/5">
                            ${hourEvents.map(e => {
                                const lawyer = lawyersMap[e.assigned_to];
                                return `
                                    <div class="bg-blue-500/20 border border-blue-500/30 rounded-lg p-3 mb-2 cursor-pointer hover:bg-blue-500/30 transition-colors" onclick="openEventModal('${e.id}')">
                                        <div class="flex items-center justify-between mb-1">
                                            <span class="text-white font-medium">${escapeHtml(e.title)}</span>
                                            <span class="text-blue-400 text-xs font-mono">${formatEventTime(e.start)} - ${formatEventTime(e.end)}</span>
                                        </div>
                                        ${e.lead ? `
                                            <div class="flex items-center gap-2 text-zinc-400 text-xs">
                                                <i class="ph ph-user"></i>
                                                ${escapeHtml(e.lead.name || '')}
                                            </div>
                                        ` : ''}
                                        ${lawyer ? `
                                            <div class="flex items-center gap-2 text-zinc-400 text-xs mt-1">
                                                <div class="w-2 h-2 rounded-full" style="background: ${lawyer.color}"></div>
                                                ${escapeHtml(lawyer.name)}
                                            </div>
                                        ` : ''}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }

            document.getElementById('day-grid').innerHTML = gridHtml;
        }

        function renderUpcomingEvents() {
            const container = document.getElementById('upcoming-events');
            const noEvents = document.getElementById('no-events');
            const now = new Date();

            const upcoming = events
                .filter(e => new Date(e.start) >= now)
                .sort((a, b) => new Date(a.start) - new Date(b.start))
                .slice(0, 5);

            if (upcoming.length === 0) {
                container.innerHTML = '';
                noEvents.classList.remove('hidden');
                return;
            }

            noEvents.classList.add('hidden');
            container.innerHTML = upcoming.map(e => {
                const date = new Date(e.start);
                const lawyer = lawyersMap[e.assigned_to];
                const typeColors = {
                    meeting: 'blue',
                    hearing: 'red',
                    deadline: 'cyan',
                    consultation: 'green'
                };
                const color = typeColors[e.event_type] || 'blue';

                return `
                    <div class="flex items-center gap-4 p-4 border border-${color}-500/20 bg-${color}-500/5 rounded-lg cursor-pointer hover:bg-${color}-500/10 transition-colors" onclick="openEventModal('${e.id}')">
                        <div class="w-12 h-12 rounded-lg bg-${color}-500/20 border border-${color}-500/30 flex flex-col items-center justify-center">
                            <span class="text-${color}-400 text-xs font-medium">${date.getDate()}</span>
                            <span class="text-${color}-400/60 text-[10px] uppercase">${date.toLocaleDateString('pl-PL', { month: 'short' })}</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-white font-medium truncate">${escapeHtml(e.title)}</div>
                            <div class="text-zinc-500 text-xs">
                                ${date.toLocaleDateString('pl-PL', { weekday: 'short' })} • ${formatEventTime(e.start)}
                                ${lawyer ? ` • ${escapeHtml(lawyer.name)}` : ''}
                            </div>
                        </div>
                        <i class="ph ph-caret-right text-zinc-600"></i>
                    </div>
                `;
            }).join('');
        }

        function formatEventTime(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
        }

        // ===========================================
        // EVENT MODAL
        // ===========================================
        function openEventModal(eventId = null) {
            const modal = document.getElementById('event-modal');
            const deleteBtn = document.getElementById('delete-event-btn');
            const modalTitle = document.getElementById('event-modal-title');

            if (eventId) {
                const event = events.find(e => e.id === eventId);
                if (!event) return;

                modalTitle.textContent = 'Edytuj wydarzenie';
                document.getElementById('event-id').value = event.id;
                document.getElementById('event-title').value = event.title || '';
                document.getElementById('event-description').value = event.description || '';
                document.getElementById('event-location').value = event.location || '';
                document.getElementById('event-assigned').value = event.assigned_to || '';

                const startDate = new Date(event.start);
                document.getElementById('event-date').value = startDate.toISOString().split('T')[0];
                document.getElementById('event-time').value = startDate.toTimeString().slice(0, 5);

                // Calculate duration
                if (event.end) {
                    const endDate = new Date(event.end);
                    const duration = Math.round((endDate - startDate) / (1000 * 60));
                    setDuration(duration);
                }

                // Set event type
                setEventType(event.event_type || 'meeting');

                // Set lead if exists
                if (event.lead_id && event.lead) {
                    selectLead(event.lead_id, event.lead);
                } else {
                    clearLead();
                }

                deleteBtn.classList.remove('hidden');
            } else {
                modalTitle.textContent = 'Nowe wydarzenie';
                document.getElementById('event-form').reset();
                document.getElementById('event-id').value = '';
                document.getElementById('event-date').value = currentDate.toISOString().split('T')[0];
                setDuration(30);
                setEventType('meeting');
                clearLead();
                deleteBtn.classList.add('hidden');
            }

            modal.classList.remove('hidden');
        }

        function closeEventModal() {
            document.getElementById('event-modal').classList.add('hidden');
        }

        function setEventType(type) {
            selectedEventType = type;
            document.getElementById('event-type').value = type;
            document.querySelectorAll('.event-type-btn').forEach(btn => {
                const isSelected = btn.dataset.type === type;
                btn.classList.toggle('border-blue-500/50', isSelected);
                btn.classList.toggle('bg-blue-500/10', isSelected);
                btn.classList.toggle('text-blue-400', isSelected);
                btn.classList.toggle('border-zinc-800', !isSelected);
                btn.classList.toggle('text-zinc-400', !isSelected);
            });
        }

        function setDuration(duration) {
            selectedDuration = duration;
            document.getElementById('event-duration').value = duration;
            document.querySelectorAll('.duration-btn').forEach(btn => {
                const isSelected = parseInt(btn.dataset.duration) === duration;
                btn.classList.toggle('border-blue-500/50', isSelected);
                btn.classList.toggle('bg-blue-500/10', isSelected);
                btn.classList.toggle('text-blue-400', isSelected);
                btn.classList.toggle('border-zinc-800', !isSelected);
                btn.classList.toggle('text-zinc-400', !isSelected);
            });
        }

        // ===========================================
        // LEAD SEARCH
        // ===========================================
        const leadSearchInput = document.getElementById('lead-search');
        const leadSearchDropdown = document.getElementById('lead-search-dropdown');

        leadSearchInput.addEventListener('input', debounce(function(e) {
            const query = e.target.value.toLowerCase().trim();
            if (query.length < 2) {
                leadSearchDropdown.classList.add('hidden');
                return;
            }

            const results = leads.filter(lead => {
                const name = (lead.name || '').toLowerCase();
                const email = (lead.email || '').toLowerCase();
                const phone = (lead.phone || '').toLowerCase();
                return name.includes(query) || email.includes(query) || phone.includes(query);
            }).slice(0, 8);

            if (results.length === 0) {
                leadSearchDropdown.innerHTML = `
                    <div class="p-4 text-center text-zinc-500 text-sm">
                        <i class="ph ph-magnifying-glass text-xl mb-1"></i>
                        <p>Nie znaleziono</p>
                    </div>
                `;
            } else {
                leadSearchDropdown.innerHTML = results.map(lead => `
                    <div class="lead-search-item p-3 cursor-pointer border-b border-white/5 last:border-0" data-id="${lead.id}">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-xs font-medium text-zinc-400">
                                ${(lead.name || '?').charAt(0).toUpperCase()}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="text-white text-sm font-medium truncate">${escapeHtml(lead.name)}</div>
                                <div class="text-zinc-500 text-xs truncate">${lead.email || lead.phone || ''}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            leadSearchDropdown.classList.remove('hidden');
        }, 200));

        leadSearchDropdown.addEventListener('click', function(e) {
            const item = e.target.closest('.lead-search-item');
            if (item) {
                const lead = leads.find(l => l.id === item.dataset.id);
                if (lead) selectLead(lead.id, lead);
            }
        });

        function selectLead(leadId, lead) {
            document.getElementById('event-lead').value = leadId;
            document.getElementById('selected-lead-name').textContent = lead.name || lead.email || 'Brak nazwy';
            document.getElementById('selected-lead-details').textContent = [lead.email, lead.phone].filter(Boolean).join(' • ');
            document.getElementById('selected-lead-info').classList.remove('hidden');
            leadSearchInput.value = '';
            leadSearchInput.classList.add('hidden');
            leadSearchDropdown.classList.add('hidden');
        }

        function clearLead() {
            document.getElementById('event-lead').value = '';
            document.getElementById('selected-lead-info').classList.add('hidden');
            leadSearchInput.classList.remove('hidden');
            leadSearchInput.value = '';
        }

        document.getElementById('clear-lead-btn').addEventListener('click', clearLead);

        document.addEventListener('click', function(e) {
            if (!e.target.closest('#lead-search') && !e.target.closest('#lead-search-dropdown')) {
                leadSearchDropdown.classList.add('hidden');
            }
        });

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // ===========================================
        // CRUD
        // ===========================================
        async function saveEvent() {
            const id = document.getElementById('event-id').value;
            const title = document.getElementById('event-title').value.trim();
            const date = document.getElementById('event-date').value;
            const time = document.getElementById('event-time').value;
            const duration = parseInt(document.getElementById('event-duration').value) || 30;

            if (!title || !date || !time) {
                showToast('Wypełnij wymagane pola', 'error');
                return;
            }

            const startTime = new Date(`${date}T${time}`);
            const endTime = new Date(startTime.getTime() + duration * 60 * 1000);

            const eventData = {
                title,
                description: document.getElementById('event-description').value.trim() || null,
                start_time: startTime.toISOString(),
                end_time: endTime.toISOString(),
                lead_id: document.getElementById('event-lead').value || null,
                assigned_to: document.getElementById('event-assigned').value || null,
                event_type: document.getElementById('event-type').value,
                location: document.getElementById('event-location').value.trim() || null
            };

            let error;
            if (id) {
                const { error: updateError } = await supabaseClient
                    .from(TABLE_EVENTS)
                    .update(eventData)
                    .eq('id', id);
                error = updateError;
            } else {
                const { error: insertError } = await supabaseClient
                    .from(TABLE_EVENTS)
                    .insert([eventData]);
                error = insertError;
            }

            if (error) {
                console.error('Error saving event:', error);
                showToast('Błąd zapisu: ' + error.message, 'error');
                return;
            }

            showToast(id ? 'Zapisano zmiany' : 'Dodano wydarzenie', 'success');
            closeEventModal();
            loadEvents();
        }

        async function deleteEvent() {
            const id = document.getElementById('event-id').value;
            if (!id) return;

            if (!confirm('Czy na pewno chcesz usunąć to wydarzenie?')) return;

            const { error } = await supabaseClient
                .from(TABLE_EVENTS)
                .delete()
                .eq('id', id);

            if (error) {
                console.error('Error deleting event:', error);
                showToast('Błąd usuwania: ' + error.message, 'error');
                return;
            }

            showToast('Usunięto wydarzenie', 'success');
            closeEventModal();
            loadEvents();
        }

        // ===========================================
        // HELPERS
        // ===========================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            toastMessage.textContent = message;
            toast.className = `fixed bottom-4 right-4 px-4 py-3 rounded-lg shadow-xl transition-all transform ${
                type === 'error' ? 'bg-red-900/90 border border-red-500/30 text-red-200' :
                type === 'success' ? 'bg-green-900/90 border border-green-500/30 text-green-200' :
                'bg-zinc-900 border border-white/10 text-white'
            }`;
            toast.classList.remove('hidden', 'translate-y-2', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => toast.classList.add('hidden'), 200);
            }, 3000);
        }

        // ===========================================
        // EVENT LISTENERS
        // ===========================================
        document.getElementById('add-event-btn').addEventListener('click', () => openEventModal());

        document.getElementById('lawyer-selector').addEventListener('change', function() {
            selectedLawyerId = this.value || null;
            loadEvents();
        });

        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentView = this.dataset.view;
                loadEvents();
            });
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() - 1);
            else if (currentView === 'week') currentDate.setDate(currentDate.getDate() - 7);
            else currentDate.setDate(currentDate.getDate() - 1);
            loadEvents();
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + 1);
            else if (currentView === 'week') currentDate.setDate(currentDate.getDate() + 7);
            else currentDate.setDate(currentDate.getDate() + 1);
            loadEvents();
        });

        document.getElementById('today-btn').addEventListener('click', () => {
            currentDate = new Date();
            loadEvents();
        });

        document.querySelectorAll('.event-type-btn').forEach(btn => {
            btn.addEventListener('click', () => setEventType(btn.dataset.type));
        });

        document.querySelectorAll('.duration-btn').forEach(btn => {
            btn.addEventListener('click', () => setDuration(parseInt(btn.dataset.duration)));
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeEventModal();
        });

        document.getElementById('event-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeEventModal();
        });

        // ===========================================
        // INIT
        // ===========================================
        async function init() {
            const session = await checkAuth();
            if (!session) return;
            await Promise.all([loadLawyers(), loadLeads()]);
            await loadEvents();
        }

        init();
    </script>
</body>
