<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset hasła - GetMyPermit CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/layout.css">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
    <script src="components/supabase.js"></script>
    <script src="components/auth.js" data-require-auth="false"></script>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">
    <div class="absolute inset-0 opacity-40 pointer-events-none">
        <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-gradient-to-br from-blue-600/30 to-purple-600/30 blur-3xl rounded-full"></div>
    </div>

    <div class="w-full max-w-md px-6 relative z-10 animate-enter">
        <div class="flex items-center justify-center gap-3 mb-10">
            <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-xl">
                <i class="ph ph-key text-white text-2xl"></i>
            </div>
            <div>
                <div class="text-white font-bold text-xl">Ustaw nowe hasło</div>
                <div class="text-zinc-500 text-xs">GetMyPermit CRM</div>
            </div>
        </div>

        <div class="card p-8">
            <div id="loading-state">
                <div class="text-center py-4"><span class="spinner-lg mx-auto"></span></div>
                <div class="text-zinc-500 text-sm text-center mt-3">Weryfikuję link…</div>
            </div>

            <div id="form-state" class="hidden">
                <h1 class="text-lg font-semibold text-white mb-2">Nowe hasło</h1>
                <p class="text-zinc-500 text-sm mb-6" id="email-hint">—</p>

                <form id="reset-form" class="space-y-4">
                    <div>
                        <label>Nowe hasło</label>
                        <input type="password" id="pwd" class="input w-full" required autocomplete="new-password" minlength="8" placeholder="min. 8 znaków">
                    </div>
                    <div>
                        <label>Powtórz hasło</label>
                        <input type="password" id="pwd2" class="input w-full" required autocomplete="new-password" minlength="8">
                    </div>
                    <button type="submit" class="btn btn-primary w-full" id="submit-btn">Ustaw hasło</button>
                </form>
                <div id="msg" class="mt-4 text-sm hidden"></div>
            </div>

            <div id="error-state" class="hidden">
                <div class="empty-state">
                    <i class="ph ph-warning-circle text-red-400"></i>
                    <div class="text-red-300 font-medium mb-2" id="error-title">Link nieprawidłowy</div>
                    <div class="text-zinc-500 text-sm" id="error-detail">Link resetu hasła wygasł lub jest nieprawidłowy.</div>
                    <a href="index.html" class="btn btn-secondary btn-sm mt-4">Wróć do logowania</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const $ = s => document.querySelector(s);
        const msgEl = () => $('#msg');

        function showMsg(text, type = 'error') {
            const el = msgEl();
            el.className = 'mt-4 text-sm px-3 py-2 rounded-md ' + (
                type === 'error' ? 'bg-red-900/30 border border-red-800/50 text-red-300' :
                'bg-emerald-900/30 border border-emerald-800/50 text-emerald-300'
            );
            el.textContent = text;
            el.classList.remove('hidden');
        }

        function showError(title, detail) {
            $('#loading-state').classList.add('hidden');
            $('#form-state').classList.add('hidden');
            $('#error-state').classList.remove('hidden');
            $('#error-title').textContent = title;
            $('#error-detail').textContent = detail;
        }

        (async () => {
            // Supabase automatycznie przechwytuje hash `#access_token=...&type=recovery`
            // Czekamy chwilę aż zostanie przetworzony
            await new Promise(r => setTimeout(r, 400));
            const { data } = await window.supabaseClient.auth.getSession();

            if (!data?.session) {
                showError('Link nieprawidłowy lub wygasł', 'Link ważny jest przez 1h. Poproś o nowy przez „Nie pamiętam hasła" na stronie logowania.');
                return;
            }

            $('#loading-state').classList.add('hidden');
            $('#form-state').classList.remove('hidden');
            $('#email-hint').textContent = `Ustaw nowe hasło dla ${data.session.user.email}`;
        })();

        $('#reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pwd = $('#pwd').value;
            const pwd2 = $('#pwd2').value;
            if (pwd !== pwd2) { showMsg('Hasła nie są takie same'); return; }
            if (pwd.length < 8) { showMsg('Minimum 8 znaków'); return; }

            $('#submit-btn').disabled = true;
            $('#submit-btn').innerHTML = '<span class="spinner mr-2"></span>Zapisuję…';
            try {
                await window.gmpAuth.updatePassword(pwd);
                showMsg('Hasło ustawione. Przekierowanie do panelu…', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (err) {
                showMsg(err.message || 'Błąd zapisu');
                $('#submit-btn').disabled = false;
                $('#submit-btn').textContent = 'Ustaw hasło';
            }
        });
    </script>
</body>
</html>
