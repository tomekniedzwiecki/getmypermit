<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Zadania - GetMyPermit CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], mono: ['JetBrains Mono','monospace'] } } } }</script>
    <link rel="stylesheet" href="components/layout.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <meta name="x-sentry-dsn" content="https://6f0737fc66f36bbdc9806377bee380b8@o4511314588205056.ingest.de.sentry.io/4511314611667024">
    <script src="components/sentry.js"></script>
    <script src="components/supabase.js"></script>
    <script src="components/auth.js"></script>
    <script src="components/haptic.js" defer></script>
    <script src="components/pull-to-refresh.js" defer></script>
</head>
<body>
<div class="app-layout">
    <div id="sidebar-placeholder"></div>
    <main class="app-main">
        <div class="page-header">
            <div>
                <h1 class="page-title">Zadania</h1>
                <p class="page-subtitle">Rozliczalność pracowników</p>
            </div>
            <button class="btn btn-secondary" onclick="exportTasks()"><i class="ph ph-download-simple"></i> CSV</button>
        </div>

        <div class="flex gap-1 mb-4 flex-wrap">
            <button class="btn btn-secondary tab-btn active" data-view="mine">Moje</button>
            <button class="btn btn-secondary tab-btn" data-view="all-open">Wszystkie otwarte</button>
            <button class="btn btn-secondary tab-btn" data-view="overdue">Po terminie</button>
            <button class="btn btn-secondary tab-btn" data-view="done">Ukończone</button>
            <div class="flex-1"></div>
            <select id="f-task-type" class="filter-input" style="width: 240px"><option value="">Wszystkie typy terminów</option></select>
            <select id="f-staff" class="filter-input" style="width: 200px"><option value="">Wszyscy staff</option></select>
        </div>

        <div class="card overflow-hidden">
            <div class="overflow-x-auto max-h-[calc(100vh-260px)]">
                <table class="gmp-table gmp-table-mobile-cards">
                    <thead>
                        <tr>
                            <th>✓</th>
                            <th>Tytuł</th>
                            <th>Typ</th>
                            <th>Sprawa</th>
                            <th>Przypisane do</th>
                            <th>Termin</th>
                            <th>W kal.</th>
                            <th>Utworzone</th>
                            <th>Status</th>
                            <th class="row-open"></th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        <tr><td colspan="8" class="p-6 text-center text-zinc-500"><span class="spinner mr-2"></span>Ładuję...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<style>.tab-btn{padding:0.4rem 0.75rem;font-size:0.8rem}.tab-btn.active{background:white;color:black}</style>
<script src="components/sidebar.js" data-active="tasks"></script>
<script>
let view = 'mine';
let staffFilter = '';
let taskTypeFilter = '';
let TASK_TYPE_LABELS = {};

document.addEventListener('gmp-auth-ready', init);
window.addEventListener('load', () => window.gmpPullRefresh?.init(() => loadList()));
async function init() {
    // Load staff + task types
    const [{ data: staff }, { data: types }] = await Promise.all([
        db.from('gmp_staff').select('id, full_name').eq('is_active', true).order('full_name'),
        db.from('gmp_task_types').select('code, label').eq('is_active', true).order('sort_order'),
    ]);
    const sel = document.getElementById('f-staff');
    (staff || []).forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.full_name; sel.appendChild(o); });

    const typeSel = document.getElementById('f-task-type');
    (types || []).forEach(t => {
        TASK_TYPE_LABELS[t.code] = t.label;
        const o = document.createElement('option');
        o.value = t.code; o.textContent = t.label;
        typeSel.appendChild(o);
    });

    await loadList();
    document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); view = b.dataset.view; loadList();
    }));
    document.getElementById('f-staff').addEventListener('change', (e) => { staffFilter = e.target.value; loadList(); });
    document.getElementById('f-task-type').addEventListener('change', (e) => { taskTypeFilter = e.target.value; loadList(); });
}

async function loadList() {
    let q = db.from('gmp_tasks').select('*, gmp_staff!assigned_to(full_name), gmp_cases(id, case_number, gmp_clients(last_name, first_name))');

    const today = new Date().toISOString().slice(0,10);
    if (view === 'mine') {
        if (!window.currentStaff) { document.getElementById('tbody').innerHTML = '<tr><td colspan="8" class="p-6 text-zinc-500">Brak profilu staff dla bieżącego usera</td></tr>'; return; }
        q = q.eq('assigned_to', window.currentStaff.id).in('status', ['pending', 'in_progress']);
    } else if (view === 'all-open') {
        q = q.in('status', ['pending', 'in_progress']);
    } else if (view === 'overdue') {
        q = q.in('status', ['pending', 'in_progress']).lt('due_date', today);
    } else if (view === 'done') {
        q = q.eq('status', 'done');
    }

    if (staffFilter) q = q.eq('assigned_to', staffFilter);
    if (taskTypeFilter) q = q.eq('task_type', taskTypeFilter);
    q = q.order('due_date', { ascending: true, nullsLast: true }).limit(500);

    const { data, error } = await q;
    const tbody = document.getElementById('tbody');
    if (error) { tbody.innerHTML = `<tr><td colspan="10" class="p-4 text-red-400">${esc(error.message)}</td></tr>`; return; }
    if (!data?.length) { tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><i class="ph ph-check-circle"></i><div>Brak zadań</div></td></tr>'; return; }

    tbody.innerHTML = data.map(t => {
        const c = t.gmp_cases;
        const client = c?.gmp_clients ? `${esc(c.gmp_clients.last_name)} ${esc(c.gmp_clients.first_name)}` : '—';
        const overdue = t.due_date && t.status !== 'done' && new Date(t.due_date) < new Date();
        const done = t.status === 'done';
        const typeLabel = TASK_TYPE_LABELS[t.task_type] || (t.task_type ? t.task_type : '—');
        const isPrivate = t.visibility === 'private';
        return `
            <tr class="${t.case_id ? 'clickable' : ''}" onclick="${t.case_id ? `if(!event.target.matches('input')) location.href='case.html?id=${t.case_id}'` : ''}">
                <td data-label=""><input type="checkbox" ${done ? 'checked' : ''} onchange="toggleTask('${t.id}', this.checked)"></td>
                <td data-label="Tytuł"><div class="text-sm ${done ? 'line-through text-zinc-500' : 'text-zinc-200'}">${isPrivate ? '<i class="ph ph-lock text-zinc-500 mr-1" title="Prywatne"></i>' : ''}${esc(t.title)}</div>${t.description ? `<div class="text-xs text-zinc-500 mt-0.5">${esc(t.description.slice(0,80))}</div>` : ''}</td>
                <td data-label="Typ" class="text-xs text-zinc-400">${esc(typeLabel)}</td>
                <td data-label="Sprawa" class="text-xs">${c ? `<div class="text-zinc-400">${client}</div><div class="text-zinc-600 font-mono">${esc(c.case_number || '')}</div>` : '—'}</td>
                <td data-label="Przypisane" class="text-xs text-zinc-400">${esc(t.gmp_staff?.full_name || '—')}</td>
                <td data-label="Termin" class="text-xs ${overdue ? 'text-red-400 font-medium' : 'text-zinc-400'}">${t.due_date ? fmt.date(t.due_date) : '—'}</td>
                <td data-label="W kal." class="text-center text-xs">${t.show_in_calendar ? '<i class="ph ph-calendar-check text-emerald-400" title="Widoczne w kalendarzu"></i>' : '<i class="ph ph-calendar-x text-zinc-700" title="Niewidoczne w kalendarzu"></i>'}</td>
                <td data-label="Utworzone" class="text-xs text-zinc-500">${fmt.daysAgo(t.created_at)}</td>
                <td data-label="Status"><span class="badge ${done ? 'badge-zakonczona' : 'badge-zlecona'}">${esc(t.status)}</span></td>
                <td class="row-open">${t.case_id ? window.rowOpen() : ''}</td>
            </tr>`;
    }).join('');
}

async function exportTasks() {
    toast.info('Przygotowuję CSV...');
    const data = await fetchAll(() => db.from('gmp_tasks')
        .select('*, gmp_staff!assigned_to(full_name), gmp_cases(case_number, gmp_clients(last_name, first_name))')
        .order('due_date', { ascending: true, nullsLast: true }));
    exportCsv('zadania', data, [
        ['Tytuł', 'title'],
        ['Opis', 'description'],
        ['Klient', r => r.gmp_cases?.gmp_clients ? `${r.gmp_cases.gmp_clients.last_name} ${r.gmp_cases.gmp_clients.first_name}` : ''],
        ['Nr sprawy', r => r.gmp_cases?.case_number || ''],
        ['Przypisane do', r => r.gmp_staff?.full_name || ''],
        ['Termin', 'due_date'],
        ['Status', 'status'],
        ['Notatka wykonania', 'completion_note'],
        ['Utworzone', 'created_at'],
    ]);
}

async function toggleTask(id, done) {
    const updates = { status: done ? 'done' : 'pending' };
    if (done) updates.completed_at = new Date().toISOString();
    const { error } = await db.from('gmp_tasks').update(updates).eq('id', id);
    if (error) { toast.error(error.message); return; }
    toast.success(done ? 'Ukończone' : 'Otwarte');
    loadList();
}
</script>
</body>
</html>
