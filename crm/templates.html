<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wzory i szablony - GetMyPermit CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/favicon-192.png">
    <link rel="apple-touch-icon" href="img/favicon-192.png">
    <link rel="shortcut icon" href="img/favicon.ico">
    <link rel="stylesheet" href="components/layout.css">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], mono: ['JetBrains Mono','monospace'] } } } }</script>
    <script src="components/supabase.js"></script>
    <script src="components/auth.js"></script>
</head>
<body>
<div class="app-layout">
    <div id="sidebar-placeholder"></div>
    <main class="app-main">
        <div class="page-header">
            <div>
                <h1 class="page-title">Wzory i szablony</h1>
                <p class="page-subtitle" id="count">Ładuję...</p>
            </div>
            <div class="flex gap-2" id="header-actions">
                <label class="btn btn-primary cursor-pointer" id="btn-upload">
                    <i class="ph ph-upload-simple"></i> Dodaj wzór
                    <input type="file" id="upload-input" class="hidden" multiple>
                </label>
                <button class="btn btn-primary hidden" id="btn-new-note-tpl" onclick="openNoteTplModal()">
                    <i class="ph ph-plus"></i> Nowy szablon
                </button>
            </div>
        </div>

        <div class="tabs mb-4">
            <button class="tab active" data-view="files"><i class="ph ph-file"></i> Pliki (dokumenty)</button>
            <button class="tab" data-view="notes"><i class="ph ph-note"></i> Notatki i maile</button>
        </div>

        <div id="view-files">
        <div class="card p-4 mb-4">
            <div class="flex gap-2 items-end">
                <div class="flex-1">
                    <label>Szukaj</label>
                    <input id="f-search" class="filter-input w-full" placeholder="Nazwa, opis, kategoria...">
                </div>
                <div>
                    <label>Kategoria</label>
                    <select id="f-cat" class="filter-input" style="width: 200px">
                        <option value="">Wszystkie</option>
                        <option value="pelnomocnictwo">Pełnomocnictwo</option>
                        <option value="wniosek">Wniosek</option>
                        <option value="odwolanie">Odwołanie</option>
                        <option value="umowa">Umowa</option>
                        <option value="oswiadczenie">Oświadczenie</option>
                        <option value="zezwolenie">Zezwolenie</option>
                        <option value="inne">Inne</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card overflow-hidden">
            <div class="overflow-x-auto max-h-[calc(100vh-280px)]">
                <table class="gmp-table">
                    <thead>
                        <tr>
                            <th>Nazwa</th>
                            <th>Kategoria</th>
                            <th>Opis</th>
                            <th>Dodano</th>
                            <th>Aktywny</th>
                            <th class="w-32">Akcje</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        <tr><td colspan="6" class="p-6 text-center text-zinc-500"><span class="spinner mr-2"></span>Ładuję...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        </div><!-- /view-files -->

        <div id="view-notes" class="hidden">
            <div class="card p-4 mb-4">
                <div class="flex gap-2 items-end">
                    <div class="flex-1">
                        <label>Szukaj</label>
                        <input id="nf-search" class="filter-input w-full" placeholder="Nazwa, treść...">
                    </div>
                    <div>
                        <label>Typ</label>
                        <select id="nf-cat" class="filter-input" style="width: 180px">
                            <option value="">Wszystkie</option>
                            <option value="note">Notatki</option>
                            <option value="email">Emaile</option>
                            <option value="sms">SMS</option>
                            <option value="whatsapp">WhatsApp</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="overflow-x-auto">
                    <table class="gmp-table">
                        <thead>
                            <tr>
                                <th>Nazwa</th>
                                <th>Typ</th>
                                <th>Opis</th>
                                <th>Podgląd treści</th>
                                <th class="w-32">Akcje</th>
                            </tr>
                        </thead>
                        <tbody id="note-tbody">
                            <tr><td colspan="5" class="p-6 text-center text-zinc-500"><span class="spinner mr-2"></span>Ładuję...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<div id="modals-container"></div>

<style>
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); }
.tabs .tab {
    padding: 8px 16px; font-size: var(--fs-sm); background: transparent;
    border: none; color: var(--text-tertiary); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    display: inline-flex; align-items: center; gap: 6px; font-weight: 500;
    transition: all 100ms;
}
.tabs .tab:hover { color: var(--text); }
.tabs .tab.active { color: var(--text); border-bottom-color: var(--accent); }
</style>
<script src="components/sidebar.js" data-active="templates"></script>
<script>
document.addEventListener('gmp-auth-ready', init);
let templates = [];
let noteTemplates = [];
let currentView = 'files';

async function init() {
    await loadList();
    ['f-cat'].forEach(id => document.getElementById(id).addEventListener('change', loadList));
    let t;
    document.getElementById('f-search').addEventListener('input', () => { clearTimeout(t); t = setTimeout(loadList, 300); });
    document.getElementById('upload-input').addEventListener('change', uploadFiles);

    // Tabs
    document.querySelectorAll('.tabs .tab').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('.tabs .tab').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        currentView = b.dataset.view;
        document.getElementById('view-files').classList.toggle('hidden', currentView !== 'files');
        document.getElementById('view-notes').classList.toggle('hidden', currentView !== 'notes');
        document.getElementById('btn-upload').classList.toggle('hidden', currentView !== 'files');
        document.getElementById('btn-new-note-tpl').classList.toggle('hidden', currentView !== 'notes');
        if (currentView === 'notes' && !noteTemplates.length) loadNoteTemplates();
    }));

    ['nf-search', 'nf-cat'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => renderNoteTemplates());
        document.getElementById(id).addEventListener('change', () => renderNoteTemplates());
    });
}

// ======== NOTE TEMPLATES ========
async function loadNoteTemplates() {
    const { data } = await db.from('gmp_note_templates')
        .select('*').order('category').order('sort_order').order('name');
    noteTemplates = data || [];
    renderNoteTemplates();
}

function renderNoteTemplates() {
    const search = document.getElementById('nf-search').value.toLowerCase().trim();
    const cat = document.getElementById('nf-cat').value;
    const filtered = noteTemplates.filter(t => {
        if (cat && t.category !== cat) return false;
        if (search) {
            const blob = `${t.name} ${t.description || ''} ${t.body_template}`.toLowerCase();
            if (!blob.includes(search)) return false;
        }
        return true;
    });

    const tbody = document.getElementById('note-tbody');
    if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state"><i class="ph ph-note"></i><div>Brak szablonów</div></td></tr>';
        return;
    }
    const iconByCat = { note: 'ph-note', email: 'ph-envelope', sms: 'ph-chat', whatsapp: 'ph-whatsapp-logo' };
    tbody.innerHTML = filtered.map(t => `
        <tr>
            <td><strong>${esc(t.name)}</strong></td>
            <td><span class="badge badge-neutral"><i class="ph ${iconByCat[t.category] || 'ph-note'}"></i> ${esc(t.category)}</span></td>
            <td class="text-xs text-zinc-400">${esc(t.description || '')}</td>
            <td class="text-xs text-zinc-500 max-w-md truncate" title="${esc(t.body_template)}">${esc(t.body_template.slice(0, 80))}${t.body_template.length > 80 ? '…' : ''}</td>
            <td>
                <button class="btn btn-ghost btn-sm" onclick="openNoteTplModal('${t.id}')" title="Edytuj"><i class="ph ph-pencil"></i></button>
                <button class="btn btn-ghost btn-sm text-red-400" onclick="deleteNoteTpl('${t.id}')" title="Usuń"><i class="ph ph-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

function openNoteTplModal(id) {
    const t = id ? noteTemplates.find(x => x.id === id) : { name: '', category: 'note', body_template: '', description: '', sort_order: 100 };
    if (!t) return;
    const html = `
        <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
            <div class="modal-content" style="max-width: 640px">
                <div class="modal-header">
                    <span>${id ? 'Edytuj szablon' : 'Nowy szablon'}</span>
                    <button class="btn btn-ghost btn-sm" onclick="closeModal()"><i class="ph ph-x"></i></button>
                </div>
                <div class="modal-body space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs muted block mb-1">Nazwa</label>
                            <input id="tpl-name" class="filter-input w-full" value="${esc(t.name)}" placeholder="np. Prośba o dokumenty">
                        </div>
                        <div>
                            <label class="text-xs muted block mb-1">Kategoria</label>
                            <select id="tpl-cat" class="filter-input w-full">
                                <option value="note" ${t.category === 'note' ? 'selected' : ''}>Notatka</option>
                                <option value="email" ${t.category === 'email' ? 'selected' : ''}>Email</option>
                                <option value="sms" ${t.category === 'sms' ? 'selected' : ''}>SMS</option>
                                <option value="whatsapp" ${t.category === 'whatsapp' ? 'selected' : ''}>WhatsApp</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="text-xs muted block mb-1">Opis (opcj.)</label>
                        <input id="tpl-desc" class="filter-input w-full" value="${esc(t.description || '')}" placeholder="Kiedy używać tego szablonu">
                    </div>
                    <div>
                        <label class="text-xs muted block mb-1">Treść</label>
                        <textarea id="tpl-body" class="input w-full" rows="10" placeholder="Treść. Użyj {klient}, {nr_sprawy}, {typ_sprawy}, {urzad}, {godzina} jako placeholdery">${esc(t.body_template)}</textarea>
                        <div class="text-[10px] muted mt-1">Dostępne placeholdery: <code>{klient}</code> <code>{nr_sprawy}</code> <code>{typ_sprawy}</code> <code>{urzad}</code> <code>{godzina}</code></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-ghost" onclick="closeModal()">Anuluj</button>
                    <button class="btn btn-primary" onclick="saveNoteTpl(${id ? `'${id}'` : 'null'})">Zapisz</button>
                </div>
            </div>
        </div>`;
    document.getElementById('modals-container').innerHTML = html;
}
window.closeModal = () => document.getElementById('modals-container').innerHTML = '';

async function saveNoteTpl(id) {
    const payload = {
        name: document.getElementById('tpl-name').value.trim(),
        category: document.getElementById('tpl-cat').value,
        description: document.getElementById('tpl-desc').value.trim() || null,
        body_template: document.getElementById('tpl-body').value,
    };
    if (!payload.name || !payload.body_template) { toast.warning('Nazwa i treść są wymagane'); return; }
    const { error } = id
        ? await db.from('gmp_note_templates').update(payload).eq('id', id)
        : await db.from('gmp_note_templates').insert({ ...payload, created_by: window.currentStaff?.id });
    if (error) { toast.error(error.message); return; }
    toast.success(id ? 'Zaktualizowano' : 'Utworzono');
    closeModal();
    await loadNoteTemplates();
}

async function deleteNoteTpl(id) {
    if (!confirm('Usunąć szablon na zawsze?')) return;
    const { error } = await db.from('gmp_note_templates').delete().eq('id', id);
    if (error) { toast.error(error.message); return; }
    toast.success('Usunięto');
    await loadNoteTemplates();
}

async function loadList() {
    let q = db.from('gmp_document_templates').select('*');
    const s = document.getElementById('f-search').value.trim();
    const cat = document.getElementById('f-cat').value;
    if (s) q = q.or(`name.ilike.%${s}%,description.ilike.%${s}%`);
    if (cat) q = q.eq('category', cat);
    q = q.order('category').order('name');
    const { data, error } = await q;
    const tbody = document.getElementById('tbody');
    if (error) { tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-red-400">${esc(error.message)}</td></tr>`; return; }
    templates = data || [];
    document.getElementById('count').textContent = `${templates.length} wzorów`;

    if (!templates.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><i class="ph ph-file-text"></i><div>Brak wzorów. Dodaj pierwszy wzór przyciskiem w prawym górnym rogu.</div></td></tr>';
        return;
    }

    tbody.innerHTML = templates.map(t => `
        <tr>
            <td><div class="text-white">${esc(t.name)}</div></td>
            <td class="text-xs"><span class="badge badge-category">${esc(t.category || '—')}</span></td>
            <td class="text-xs text-zinc-400 max-w-md truncate">${esc(t.description || '')}</td>
            <td class="text-xs text-zinc-500">${fmt.date(t.created_at)}</td>
            <td>${t.is_active ? '<span class="badge badge-aktywna">aktywny</span>' : '<span class="badge badge-archiwum">nieaktywny</span>'}</td>
            <td>
                <button class="btn btn-ghost btn-sm" onclick="downloadTemplate('${t.id}')" title="Pobierz"><i class="ph ph-download-simple"></i></button>
                <button class="btn btn-ghost btn-sm" onclick="editTemplate('${t.id}')" title="Edytuj"><i class="ph ph-pencil-simple"></i></button>
                <button class="btn btn-ghost btn-sm" onclick="deleteTemplate('${t.id}')" title="Usuń"><i class="ph ph-trash text-red-400"></i></button>
            </td>
        </tr>`).join('');
}

async function uploadFiles(e) {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    for (const file of files) {
        const path = `templates/${Date.now()}_${file.name}`;
        const { error: upErr } = await window.supabaseClient.storage
            .from('documents').upload(path, file);
        if (upErr) { toast.error('Upload: ' + upErr.message); continue; }

        await db.from('gmp_document_templates').insert({
            name: file.name.replace(/\.[^.]+$/, ''),
            storage_path: path,
            category: 'inne',
            is_active: true,
        });
    }
    toast.success(`Dodano ${files.length}`);
    loadList();
    e.target.value = '';
}

async function editTemplate(id) {
    const t = templates.find(x => x.id === id);
    if (!t) return;
    const name = prompt('Nazwa:', t.name);
    if (name === null) return;
    const category = prompt('Kategoria (pelnomocnictwo/wniosek/odwolanie/umowa/oswiadczenie/zezwolenie/inne):', t.category || 'inne');
    if (category === null) return;
    const description = prompt('Opis:', t.description || '');
    if (description === null) return;
    const { error } = await db.from('gmp_document_templates').update({
        name: name.trim(),
        category: category.trim(),
        description: description.trim() || null,
    }).eq('id', id);
    if (error) { toast.error(error.message); return; }
    toast.success('Zapisano');
    loadList();
}

async function deleteTemplate(id) {
    if (!confirm('Usunąć wzór?')) return;
    const t = templates.find(x => x.id === id);
    if (t?.storage_path) {
        await window.supabaseClient.storage.from('documents').remove([t.storage_path]);
    }
    const { error } = await db.from('gmp_document_templates').delete().eq('id', id);
    if (error) { toast.error(error.message); return; }
    toast.success('Usunięto');
    loadList();
}

async function downloadTemplate(id) {
    const t = templates.find(x => x.id === id);
    if (!t?.storage_path) { toast.error('Brak pliku'); return; }
    const { data, error } = await window.supabaseClient.storage.from('documents').createSignedUrl(t.storage_path, 60);
    if (error) { toast.error(error.message); return; }
    window.open(data.signedUrl, '_blank');
}
</script>
</body>
</html>
