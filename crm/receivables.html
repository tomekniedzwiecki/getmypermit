<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Windykacja - GetMyPermit CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/favicon-192.png">
    <link rel="apple-touch-icon" href="img/favicon-192.png">
    <link rel="shortcut icon" href="img/favicon.ico">
    <link rel="stylesheet" href="components/layout.css">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], mono: ['JetBrains Mono','monospace'] } } } }</script>
    <script src="components/supabase.js"></script>
    <script src="components/auth.js"></script>
</head>
<body>

<style>
/* Module-specific refinements */
.hero-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-2xl);
    padding: 24px 28px;
}
.hero-value {
    font-family: 'Inter', sans-serif;
    font-size: var(--fs-hero);
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
}
.hero-label {
    font-size: var(--fs-xs);
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
}
.metric-card {
    padding: 16px 20px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.metric-value { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; line-height: 1.2; }
.metric-label { font-size: var(--fs-xs); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
.metric-sub { font-size: var(--fs-xs); color: var(--text-muted); margin-top: 4px; }

/* Level badges - subtle, consistent */
.lvl {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: var(--r-sm);
    font-size: var(--fs-xs);
    font-weight: 500;
    letter-spacing: 0.01em;
    white-space: nowrap;
    border: 1px solid transparent;
}
.lvl-new          { background: rgba(161,161,170,0.10); color: #d4d4d8; }
.lvl-reminder_soft { background: rgba(16,185,129,0.10); color: #6ee7b7; }
.lvl-reminder_firm { background: rgba(245,158,11,0.10); color: #fcd34d; }
.lvl-demand_1     { background: rgba(249,115,22,0.10); color: #fdba74; }
.lvl-demand_final { background: rgba(239,68,68,0.10); color: #fca5a5; }
.lvl-pre_court    { background: rgba(168,85,247,0.12); color: #d8b4fe; }
.lvl-epu          { background: rgba(220,38,38,0.15); color: #fca5a5; border-color: rgba(220,38,38,0.25); }
.lvl-court        { background: rgba(220,38,38,0.2); color: white; }
.lvl-settled      { background: rgba(16,185,129,0.15); color: #10b981; }
.lvl-write_off    { background: rgba(113,113,122,0.15); color: var(--text-muted); text-decoration: line-through; }

/* Age pills - minimal */
.age {
    display: inline-block;
    padding: 1px 6px;
    border-radius: var(--r-sm);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
}
.age-0      { background: rgba(16,185,129,0.08); color: #6ee7b7; }
.age-1      { background: rgba(245,158,11,0.08); color: #fcd34d; }
.age-2      { background: rgba(249,115,22,0.08); color: #fdba74; }
.age-3      { background: rgba(239,68,68,0.08); color: #fca5a5; }
.age-4      { background: rgba(239,68,68,0.14); color: #fca5a5; }
.age-5      { background: rgba(127,29,29,0.3); color: #fca5a5; }

/* === WORKLIST ROW - Linear-style clean grid === */
.work-list { display: flex; flex-direction: column; gap: 6px; }

.work-row {
    display: grid;
    grid-template-columns: 40px minmax(0, 1fr) 170px 136px;
    align-items: center;
    gap: 16px;
    padding: 14px 16px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    transition: border-color 120ms, background 120ms;
    min-height: 66px;
    position: relative;
    text-decoration: none;
    color: inherit;
}
.work-row:hover {
    border-color: var(--border-hover);
    background: var(--bg);
}
.work-row.prio-high { border-left: 2px solid var(--danger); }
.work-row.prio-mid  { border-left: 2px solid var(--warn); }
.work-row.prio-high, .work-row.prio-mid { padding-left: 15px; }

.work-main { min-width: 0; display: flex; flex-direction: column; gap: 4px; }

.work-title-line {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
}
.work-name {
    font-size: var(--fs-md);
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    line-height: 1.35;
}
.work-name:hover { color: var(--accent); }

.work-meta-line {
    font-size: var(--fs-xs);
    color: var(--text-tertiary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1.4;
}
.work-meta-line .sep { color: var(--text-disabled); flex-shrink: 0; }
.work-meta-line > span { flex-shrink: 0; }
.work-meta-line .flex-item { min-width: 0; flex-shrink: 1; overflow: hidden; text-overflow: ellipsis; }

.work-amount-col {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: center;
    font-variant-numeric: tabular-nums;
}
.work-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: -0.02em;
}
.work-interest {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--warn);
    margin-top: 2px;
    letter-spacing: -0.01em;
}

.work-actions-col {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 2px;
    opacity: 0.55;
    transition: opacity 100ms;
}
.work-row:hover .work-actions-col { opacity: 1; }

.work-action {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px; height: 30px;
    border-radius: var(--r-md);
    color: var(--text-tertiary);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: background 100ms, color 100ms;
    font-size: 15px;
    text-decoration: none;
    flex-shrink: 0;
}
.work-action:hover:not(:disabled) { background: var(--bg-hover); color: var(--text); }
.work-action:disabled { opacity: 0.25; cursor: not-allowed; }
.work-action.is-call:hover { color: var(--success); }
.work-action.is-wa:hover { color: #25d366; }
.work-action.is-email:hover { color: var(--accent); }
.work-action.is-danger:hover { color: var(--danger); }

/* Inline badge pack for title line - small */
.work-title-line .lvl,
.work-title-line .age,
.work-title-line .pill {
    flex-shrink: 0;
}

.pill {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 1px 7px;
    border-radius: var(--r-sm);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.01em;
    white-space: nowrap;
    line-height: 1.6;
}
.pill-warn   { background: var(--warn-subtle);    color: #fcd34d; }
.pill-danger { background: var(--danger-subtle);  color: #fca5a5; }
.pill-success { background: var(--success-subtle); color: #6ee7b7; }
.pill-muted  { background: var(--bg-subtle);     color: var(--text-tertiary); }
.pill i { font-size: 10px; }

/* Dropdown menu */
.dropdown {
    position: absolute;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-lg);
    padding: 4px;
    z-index: 20;
    min-width: 200px;
}
.dropdown-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: var(--r-sm);
    color: var(--text);
    font-size: var(--fs-base);
    cursor: pointer;
    transition: background 100ms;
}
.dropdown-item:hover { background: var(--bg-hover); }
.dropdown-item.danger { color: #fca5a5; }
.dropdown-item.danger:hover { background: rgba(239,68,68,0.1); }

.toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    background: var(--bg-elevated);
    margin-bottom: 16px;
    flex-wrap: wrap;
}
.toolbar .filter-input { width: auto; padding: 6px 10px; font-size: var(--fs-base); }

.chart-container { position: relative; height: 260px; width: 100%; }

/* Sort indicators */
.sort-caret { display: inline-flex; flex-direction: column; gap: 0; margin-left: 4px; opacity: 0.3; }

/* === MOBILE receivables === */
@media (max-width: 600px) {
    .work-row {
        grid-template-columns: 36px 1fr !important;
        grid-template-rows: auto auto auto;
        gap: 8px 10px !important;
        padding: 12px !important;
        min-height: auto !important;
    }
    .work-row > .avatar { grid-row: 1 / 4; }
    .work-row .work-main { grid-column: 2; grid-row: 1; }
    .work-row .work-amount-col { grid-column: 2; grid-row: 2; flex-direction: row; justify-content: flex-start; gap: 8px; }
    .work-row .work-actions-col { grid-column: 1 / 3; grid-row: 3; justify-content: space-between; opacity: 1 !important; padding-top: 6px; border-top: 1px solid var(--border); margin-top: 4px; }
    .work-title-line { flex-wrap: wrap; gap: 4px !important; }
    .work-amount { font-size: 15px !important; }
    .hero-card { padding: 16px !important; }
    .hero-value { font-size: 26px !important; }
    .metric-card { padding: 12px 14px !important; }
    .metric-value { font-size: 18px !important; }
    .chart-container { height: 220px !important; }
    .toolbar { padding: 8px 10px !important; gap: 6px !important; }
}
</style>

<div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <main class="app-main">
        <!-- Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title">Windykacja</h1>
                <p class="page-subtitle">Aktywny proces odzyskiwania należności</p>
            </div>
            <div class="flex gap-2">
                <button class="btn btn-secondary btn-sm" onclick="runAutomation()" title="Eskaluje poziomy, tworzy zadania dla opiekunów">
                    <i class="ph ph-robot"></i> Uruchom automatyzację
                </button>
                <button class="btn btn-secondary btn-sm" onclick="refreshPriorities()">
                    <i class="ph ph-arrow-clockwise"></i> Przelicz priorytety
                </button>
                <button class="btn btn-secondary btn-sm" onclick="exportCSV()">
                    <i class="ph ph-download-simple"></i> Export CSV
                </button>
            </div>
        </div>

        <!-- Hero metric + secondary metrics -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6">
            <div class="hero-card md:col-span-1" style="display: flex; flex-direction: column; justify-content: space-between;">
                <div class="hero-label">Do odzyskania</div>
                <div class="hero-value" id="k-total">—</div>
                <div class="metric-sub" id="k-total-count">—</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Z kontaktem</div>
                <div class="metric-value text-success" id="k-contactable">—</div>
                <div class="metric-sub" id="k-contactable-sub">—</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Prognoza odzysku</div>
                <div class="metric-value text-warn" id="k-expected">—</div>
                <div class="metric-sub">ważona probability</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Do zrobienia dziś</div>
                <div class="metric-value" id="k-today">—</div>
                <div class="metric-sub" id="k-today-sub">kontaktów zaplanowanych</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-view="worklist">Worklist <span class="tab-count" id="tc-worklist">—</span></button>
            <button class="tab" data-view="dashboard">Dashboard</button>
            <button class="tab" data-view="all">Wszystkie</button>
            <button class="tab" data-view="promises">Obietnice <span class="tab-count" id="tc-promises">—</span></button>
            <button class="tab" data-view="no-contact">Bez kontaktu <span class="tab-count" id="tc-nocontact">—</span></button>
            <button class="tab" data-view="old">EPU (365+) <span class="tab-count" id="tc-old">—</span></button>
        </div>

        <div id="view-content">
            <div class="empty-state"><div class="spinner-lg mx-auto"></div></div>
        </div>
    </main>
</div>

<div id="modals-container"></div>

<script src="components/sidebar.js" data-active="receivables"></script>
<script>
let currentView = 'worklist';
let allCollections = [];
let staffList = [];

const LEVEL_LABELS = {
    new: 'Nowa', reminder_soft: 'Przypomnienie', reminder_firm: 'Ponaglenie',
    demand_1: 'Wezwanie', demand_final: 'Ostateczne', pre_court: 'Przedsądowe',
    epu: 'EPU', court: 'Sąd', settled: 'Opłacona', write_off: 'Odpisana'
};

const BUCKETS = [
    { name: '0-30', min: 0, max: 30, cls: 'age-0', color: '#10b981' },
    { name: '31-60', min: 31, max: 60, cls: 'age-1', color: '#f59e0b' },
    { name: '61-90', min: 61, max: 90, cls: 'age-2', color: '#f97316' },
    { name: '91-180', min: 91, max: 180, cls: 'age-3', color: '#ef4444' },
    { name: '181-365', min: 181, max: 365, cls: 'age-4', color: '#dc2626' },
    { name: '365+', min: 366, max: 99999, cls: 'age-5', color: '#7f1d1d' },
];

const INTEREST_RATE = 0.1125;

document.addEventListener('gmp-auth-ready', init);

async function init() {
    if (!window.gmpAuth.hasPermission(window.currentStaff, 'view_global_finance')) {
        alert('Brak uprawnień do modułu windykacji.');
        window.location.href = 'dashboard.html'; return;
    }
    const { data: staff } = await db.from('gmp_staff').select('id, full_name, color').order('full_name');
    staffList = staff || [];
    await loadCollections();

    document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        currentView = b.dataset.view;
        render();
    }));

    render();
    renderKPIs();
}

async function loadCollections() {
    // Tylko aktywne z remaining > 0
    allCollections = await fetchAll(() =>
        db.from('gmp_collection_overview').select('*').eq('status', 'active').gt('remaining_amount', 0)
    );
}

function getBucket(days) { if (days == null) return null; return BUCKETS.find(b => days >= b.min && days <= b.max); }
function getAgeDays(c) { const d = c.date_last_activity || c.date_accepted; if (!d) return null; return Math.floor((Date.now() - new Date(d).getTime()) / 86400000); }
function hasContact(c) { return !!(c.phone || c.email || c.employer_phone || c.employer_email); }
function calcInterest(amount, days) { return (Number(amount) * INTEREST_RATE * days) / 365; }

function renderKPIs() {
    const total = allCollections.reduce((s, c) => s + Number(c.remaining_amount || 0), 0);
    const contactable = allCollections.filter(hasContact);
    const contactableSum = contactable.reduce((s, c) => s + Number(c.remaining_amount || 0), 0);
    const expected = allCollections.reduce((s, c) => s + Number(c.remaining_amount || 0) * (c.probability_score / 100), 0);
    const today = new Date().toISOString().slice(0, 10);
    const todayWork = allCollections.filter(c => c.next_action_at && c.next_action_at.slice(0, 10) <= today);
    const promises = allCollections.filter(c => c.promise_to_pay_date);
    const noContact = allCollections.filter(c => !hasContact(c));
    const old = allCollections.filter(c => { const age = getAgeDays(c); return age !== null && age >= 365; });

    document.getElementById('k-total').textContent = fmt.money(total);
    document.getElementById('k-total-count').textContent = `${allCollections.length} spraw • średnio ${fmt.money(total / (allCollections.length || 1))}`;
    document.getElementById('k-contactable').textContent = fmt.money(contactableSum);
    document.getElementById('k-contactable-sub').textContent = `${contactable.length} z ${allCollections.length} spraw`;
    document.getElementById('k-expected').textContent = fmt.money(expected);
    document.getElementById('k-today').textContent = fmt.num(todayWork.length);
    document.getElementById('k-today-sub').textContent = `${allCollections.length - todayWork.length} zaplanowanych na później`;

    // Tab counts
    document.getElementById('tc-worklist').textContent = todayWork.length || allCollections.length;
    document.getElementById('tc-promises').textContent = promises.length;
    document.getElementById('tc-nocontact').textContent = noContact.length;
    document.getElementById('tc-old').textContent = old.length;
}

function render() {
    const el = document.getElementById('view-content');
    if (currentView === 'worklist') renderWorklist();
    else if (currentView === 'dashboard') renderDashboard();
    else if (currentView === 'all') renderAll();
    else if (currentView === 'promises') renderPromises();
    else if (currentView === 'no-contact') renderNoContact();
    else if (currentView === 'old') renderOld();
}

function workRow(c) {
    const client = ((c.last_name || '—') + ' ' + (c.first_name || '')).trim();
    const age = getAgeDays(c);
    const bucket = getBucket(age);
    const interest = age ? calcInterest(c.remaining_amount, age) : 0;
    const prioClass = c.priority_score >= 70 ? 'prio-high' : (c.priority_score >= 45 ? 'prio-mid' : '');

    const phoneDigits = (c.phone || '').replace(/\D/g, '');
    const phoneIntl = phoneDigits && !phoneDigits.startsWith('48') ? '48' + phoneDigits : phoneDigits;
    const waUrl = phoneIntl ? `https://wa.me/${phoneIntl}` : null;
    const mailUrl = c.email ? `mailto:${encodeURIComponent(c.email)}?subject=${encodeURIComponent('Zaległość - ' + (c.case_number || ''))}` : null;
    const callUrl = phoneDigits ? `tel:${phoneIntl || phoneDigits}` : null;

    const promiseDue = c.promise_to_pay_date && c.promise_to_pay_date < new Date().toISOString().slice(0, 10);

    // Status pills in title line (max 1-2 to keep clean)
    const pills = [];
    if (promiseDue) pills.push(`<span class="pill pill-danger"><i class="ph ph-x-circle"></i>obietnica niedotrzymana</span>`);
    else if (c.promise_to_pay_date) pills.push(`<span class="pill pill-success"><i class="ph ph-handshake"></i>obiecał ${fmt.date(c.promise_to_pay_date)}</span>`);
    if (!hasContact(c)) pills.push(`<span class="pill pill-warn"><i class="ph ph-phone-slash"></i>brak kontaktu</span>`);

    // Meta line - compact
    const metaBits = [];
    if (c.case_number) metaBits.push(`<span class="mono">#${esc(c.case_number)}</span>`);
    if (c.employer_name) metaBits.push(`<span class="flex-item">${esc(c.employer_name)}</span>`);
    metaBits.push(c.assigned_name ? `<span>${esc(c.assigned_name)}</span>` : `<span class="text-warn">nieprzypisana</span>`);
    if (c.phone) metaBits.push(`<span class="mono">${esc(c.phone)}</span>`);
    if (c.last_contact_at) metaBits.push(`<span>ostatni kontakt: ${fmt.daysAgo(c.last_contact_at)}</span>`);

    return `
    <div class="work-row ${prioClass}" data-id="${c.collection_id}">
        ${window.avatar(client)}

        <div class="work-main">
            <div class="work-title-line">
                <a href="case.html?id=${c.case_id}" class="work-name">${esc(client)}</a>
                <span class="lvl lvl-${c.level}">${LEVEL_LABELS[c.level] || c.level}</span>
                ${bucket ? `<span class="age ${bucket.cls}">${age}d</span>` : ''}
                ${pills.join('')}
            </div>
            <div class="work-meta-line">
                ${metaBits.join('<span class="sep">·</span>')}
            </div>
        </div>

        <div class="work-amount-col">
            <div class="work-amount">${fmt.money(c.remaining_amount)}</div>
            ${interest > 50 ? `<div class="work-interest">+${fmt.money(interest)} odsetki</div>` : ''}
        </div>

        <div class="work-actions-col">
            ${callUrl
                ? `<a href="${callUrl}" class="work-action is-call" onclick="event.stopPropagation(); logActivity('${c.collection_id}', 'phone_call')" title="Zadzwoń"><i class="ph ph-phone-call"></i></a>`
                : `<button class="work-action is-call" disabled title="Brak telefonu"><i class="ph ph-phone-call"></i></button>`}
            ${mailUrl
                ? `<a href="${mailUrl}" class="work-action is-email" onclick="event.stopPropagation(); logActivity('${c.collection_id}', 'email')" title="Email"><i class="ph ph-envelope"></i></a>`
                : `<button class="work-action is-email" disabled title="Brak emaila"><i class="ph ph-envelope"></i></button>`}
            <button class="work-action" onclick="event.stopPropagation(); openLogModal('${c.collection_id}')" title="Zapisz kontakt"><i class="ph ph-chat-text"></i></button>

function renderDashboard() {
    const el = document.getElementById('view-content');

    const byBucket = {};
    BUCKETS.forEach(b => byBucket[b.name] = { count: 0, amount: 0, withContact: 0, withContactSum: 0 });
    byBucket['brak_daty'] = { count: 0, amount: 0, withContact: 0, withContactSum: 0 };
    allCollections.forEach(c => {
        const age = getAgeDays(c);
        const b = getBucket(age);
        const key = b ? b.name : 'brak_daty';
        byBucket[key].count++;
        byBucket[key].amount += Number(c.remaining_amount || 0);
        if (hasContact(c)) {
            byBucket[key].withContact++;
            byBucket[key].withContactSum += Number(c.remaining_amount || 0);
        }
    });

    const byStaff = {};
    allCollections.forEach(c => {
        const name = c.assigned_name || '(nieprzypisana)';
        if (!byStaff[name]) byStaff[name] = { count: 0, amount: 0 };
        byStaff[name].count++;
        byStaff[name].amount += Number(c.remaining_amount || 0);
    });
    const staffRanking = Object.entries(byStaff).sort((a, b) => b[1].amount - a[1].amount);

    const probs = { '0-30': 90, '31-60': 75, '61-90': 55, '91-180': 35, '181-365': 20, '365+': 10, 'brak_daty': 30 };

    el.innerHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
            <section class="card">
                <div class="card-header">Struktura wg wieku</div>
                <div class="card-body"><div class="chart-container"><canvas id="chart-aging"></canvas></div></div>
            </section>
            <section class="card">
                <div class="card-header">Poziomy eskalacji</div>
                <div class="card-body"><div class="chart-container"><canvas id="chart-levels"></canvas></div></div>
            </section>
        </div>

        <section class="card mb-4">
            <div class="card-header">Aging - szczegóły i prognoza odzysku</div>
            <div class="overflow-x-auto">
                <table class="gmp-table gmp-table-mobile-cards">
                    <thead><tr><th>Bucket</th><th class="text-right">Spraw</th><th class="text-right">Kwota</th><th class="text-right">Z kontaktem</th><th class="text-right">Recovery rate</th><th class="text-right">Prognoza odzysku</th></tr></thead>
                    <tbody>${Object.entries(byBucket).map(([name, b]) => {
                        if (b.count === 0) return '';
                        const prob = probs[name] || 30;
                        const expected = b.amount * prob / 100;
                        return `<tr>
                            <td><span class="age ${(BUCKETS.find(x => x.name === name) || {}).cls || ''}">${name}</span></td>
                            <td class="text-right mono">${b.count}</td>
                            <td class="text-right mono">${fmt.money(b.amount)}</td>
                            <td class="text-right mono text-success">${fmt.money(b.withContactSum)}</td>
                            <td class="text-right mono text-tertiary">${prob}%</td>
                            <td class="text-right mono text-warn font-semibold">${fmt.money(expected)}</td>
                        </tr>`;
                    }).join('')}</tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <div class="card-header">Zaległości per opiekun</div>
            <div class="card-body space-y-3">
                ${staffRanking.map(([name, d]) => {
                    const max = staffRanking[0][1].amount || 1;
                    const pct = Math.round(100 * d.amount / max);
                    const unassigned = name === '(nieprzypisana)';
                    return `<div>
                        <div class="flex justify-between items-center mb-1.5">
                            <span class="text-sm ${unassigned ? 'text-warn' : ''}">${esc(name)}</span>
                            <span class="mono text-sm">${fmt.money(d.amount)} <span class="text-tertiary">· ${d.count} spr.</span></span>
                        </div>
                        <div class="h-1.5 bg-subtle rounded-full overflow-hidden" style="background: var(--bg-subtle)">
                            <div class="h-full rounded-full" style="width: ${pct}%; background: ${unassigned ? 'var(--warn)' : 'var(--accent)'}"></div>
                        </div>
                    </div>`;
                }).join('')}
            </div>
        </section>
    `;

    // Aging chart
    const bucketLabels = BUCKETS.filter(b => (byBucket[b.name]?.count || 0) > 0).map(b => b.name);
    const bucketData = bucketLabels.map(n => byBucket[n].amount);
    const bucketColors = bucketLabels.map(n => (BUCKETS.find(b => b.name === n) || {}).color || '#71717a');

    new Chart(document.getElementById('chart-aging'), {
        type: 'doughnut',
        data: { labels: bucketLabels, datasets: [{ data: bucketData, backgroundColor: bucketColors, borderColor: 'var(--bg)', borderWidth: 2 }] },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { position: 'right', labels: { color: '#a1a1aa', font: { size: 11, family: 'Inter' }, boxWidth: 12 } },
                tooltip: { callbacks: { label: ctx => `${ctx.label}: ${fmt.money(ctx.parsed)}` } }
            }
        }
    });

    // Levels
    const byLevel = {};
    allCollections.forEach(c => { byLevel[c.level] = (byLevel[c.level] || 0) + 1; });
    const levelEntries = Object.entries(byLevel).sort((a,b) => b[1] - a[1]);

    new Chart(document.getElementById('chart-levels'), {
        type: 'bar',
        data: {
            labels: levelEntries.map(e => LEVEL_LABELS[e[0]] || e[0]),
            datasets: [{ data: levelEntries.map(e => e[1]), backgroundColor: '#6366f1cc', borderWidth: 0, borderRadius: 4 }]
        },
        options: {
            indexAxis: 'y', responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { ticks: { color: '#71717a' }, grid: { color: 'rgba(255,255,255,0.04)' } },
                y: { ticks: { color: '#a1a1aa', font: { size: 11 } }, grid: { display: false } }
            }
        }
    });
}

// ============ DROPDOWN ============
let openDropdown = null;
function openMoreMenu(e, collectionId) {
    e.stopPropagation();
    if (openDropdown) { openDropdown.remove(); openDropdown = null; }
    const c = allCollections.find(x => x.collection_id === collectionId);
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    const menu = document.createElement('div');
    menu.className = 'dropdown';
    menu.style.top = (rect.bottom + 4) + 'px';
    menu.style.right = (window.innerWidth - rect.right) + 'px';

    const phoneDigits = (c?.phone || '').replace(/\D/g, '');
    const phoneIntl = phoneDigits && !phoneDigits.startsWith('48') ? '48' + phoneDigits : phoneDigits;

    menu.innerHTML = `
        ${phoneIntl ? `<a class="dropdown-item" href="https://wa.me/${phoneIntl}" target="_blank" onclick="logActivity('${collectionId}', 'whatsapp')"><i class="ph ph-whatsapp-logo"></i>Napisz WhatsApp</a>` : ''}
        <div class="dropdown-item" onclick="openPromiseModal('${collectionId}')"><i class="ph ph-handshake"></i>Obietnica zapłaty</div>
        <div class="dropdown-item" onclick="generateDemandPDF('${collectionId}')"><i class="ph ph-file-pdf"></i>Wygeneruj wezwanie PDF</div>
        <div class="dropdown-item" onclick="escalate('${collectionId}')"><i class="ph ph-arrow-up"></i>Eskalacja do wyższego poziomu</div>
        <div style="border-top: 1px solid var(--border); margin: 4px 0"></div>
        <div class="dropdown-item" onclick="markAsPaid('${collectionId}')"><i class="ph ph-check-circle"></i>Oznacz jako opłacone</div>
        <div class="dropdown-item" onclick="pauseCollection('${collectionId}')"><i class="ph ph-pause"></i>Wstrzymaj windykację</div>
        <div class="dropdown-item danger" onclick="writeOff('${collectionId}')"><i class="ph ph-x-circle"></i>Odpisz jako stratę</div>
    `;
    document.body.appendChild(menu);
    openDropdown = menu;
    setTimeout(() => document.addEventListener('click', closeDropdownOnOutside, { once: true }), 10);
}
function closeDropdownOnOutside() { if (openDropdown) { openDropdown.remove(); openDropdown = null; } }

// ============ ACTIONS ============
async function logActivity(collectionId, type) {
    const c = allCollections.find(x => x.collection_id === collectionId);
    if (!c) return;
    await db.from('gmp_collection_activities').insert({
        collection_id: collectionId, case_id: c.case_id,
        activity_type: type, direction: 'outbound',
        content: `Próba kontaktu: ${type}`,
        created_by: window.currentStaff?.id,
    });
    const updates = { last_contact_at: new Date().toISOString() };
    if (type === 'phone_call') updates.attempted_calls = (c.attempted_calls || 0) + 1;
    else updates.attempted_emails = (c.attempted_emails || 0) + 1;
    await db.from('gmp_collections').update(updates).eq('id', collectionId);
    toast.success('Zalogowano kontakt');
}

async function saveLogActivity(collectionId) {
    const c = allCollections.find(x => x.collection_id === collectionId);
    if (!c) return;
    const type = document.getElementById('la-type').value;
    const result = document.getElementById('la-result').value;
    const content = document.getElementById('la-content').value.trim();
    const followup = document.getElementById('la-followup').value;
    const promiseDate = document.getElementById('la-promise-date').value;
    const promiseAmount = Number(document.getElementById('la-promise-amount').value);

    await db.from('gmp_collection_activities').insert({
        collection_id: collectionId, case_id: c.case_id,
        activity_type: type, direction: 'outbound',
        content, result,
        followup_at: followup ? new Date(followup).toISOString() : null,
        promise_date: promiseDate || null, promise_amount: promiseAmount || null,
        created_by: window.currentStaff?.id,
    });

    const updates = { last_contact_at: new Date().toISOString() };
    if (followup) updates.next_action_at = new Date(followup).toISOString();
    if (promiseDate) { updates.promise_to_pay_date = promiseDate; updates.promise_to_pay_amount = promiseAmount || null; }
    if (result === 'paid_full') updates.status = 'paid';
    if (result === 'wrong_contact') updates.status = 'paused';
    await db.from('gmp_collections').update(updates).eq('id', collectionId);

    await db.from('gmp_case_activities').insert({
        case_id: c.case_id, activity_type: 'note',
        content: `[Windykacja/${type}] ${content} (wynik: ${result})`,
        created_by: window.currentStaff?.id,
    });

    closeLogModal();
    toast.success('Zapisano');
    await loadCollections();
    render();
    renderKPIs();
}

async function savePromise(collectionId) {
    const c = allCollections.find(x => x.collection_id === collectionId);
    const date = document.getElementById('pr-date').value;
    const amount = Number(document.getElementById('pr-amount').value);
    const note = document.getElementById('pr-note').value.trim();
    await db.from('gmp_collections').update({
        promise_to_pay_date: date, promise_to_pay_amount: amount,
        next_action_at: new Date(new Date(date).getTime() + 86400000).toISOString(),
    }).eq('id', collectionId);
    await db.from('gmp_collection_activities').insert({
        collection_id: collectionId, case_id: c.case_id,
        activity_type: 'promise_to_pay', direction: 'inbound',
        content: note || `Klient obiecał zapłacić ${amount} PLN do ${date}`,
        promise_date: date, promise_amount: amount,
        created_by: window.currentStaff?.id,
    });

    await loadCollections();
    render();
    renderKPIs();
}

async function escalate(collectionId) {
    closeDropdownOnOutside();
    const c = allCollections.find(x => x.collection_id === collectionId);
    if (!c) return;
    const levels = ['new', 'reminder_soft', 'reminder_firm', 'demand_1', 'demand_final', 'pre_court', 'epu'];
    const idx = levels.indexOf(c.level);
    if (idx === -1 || idx >= levels.length - 1) { toast.warning('Najwyższy poziom'); return; }
    const next = levels[idx + 1];
    if (!confirm(`Eskalować z "${LEVEL_LABELS[c.level]}" do "${LEVEL_LABELS[next]}"?`)) return;
    await db.from('gmp_collections').update({ level: next }).eq('id', collectionId);
    await db.from('gmp_collection_activities').insert({
        collection_id: collectionId, case_id: c.case_id,
        activity_type: 'escalation',
        content: `Eskalacja: ${LEVEL_LABELS[c.level]} → ${LEVEL_LABELS[next]}`,
        created_by: window.currentStaff?.id,
    });
    toast.success('Eskalowano');
    await loadCollections();
    render();
}

async function generateDemandPDF(collectionId) {
    const c = allCollections.find(x => x.collection_id === collectionId);
    if (!c) return;
    const level = c.level === 'demand_final' ? 'demand_final' : 'demand_1';
    const { data: tmpl } = await db.from('gmp_collection_templates')
        .select('*').eq('escalation_level', level).eq('channel', 'letter_certified').limit(1).maybeSingle();

    const age = getAgeDays(c) || 0;
    const interest = calcInterest(c.remaining_amount, age);
    const total = Number(c.remaining_amount) + interest;

    const params = {
        client_name: ((c.last_name || '') + ' ' + (c.first_name || '')).trim(),
        case_number: c.case_number || c.case_id.slice(0, 8),
        amount: Number(c.remaining_amount).toFixed(2),
        due_date: c.date_accepted || '',
        days_overdue: age,
        interest: interest.toFixed(2),
        total: total.toFixed(2),
        today: new Date().toLocaleDateString('pl-PL'),
        amount_words: Number(total).toFixed(2).replace('.', ',') + ' zl',
    };

    let body = tmpl?.body_template || `WEZWANIE DO ZAPLATY\n\n${params.client_name}\n\nWzywam do zaplaty kwoty ${params.total} PLN.`;
    Object.entries(params).forEach(([k, v]) => {
        body = body.replace(new RegExp('\\{' + k + '\\}', 'g'), String(v));
    });

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const toAscii = (s) => String(s).replace(/[ąęłńóśźżĄĘŁŃÓŚŹŻ]/g, c => ({'ą':'a','ę':'e','ł':'l','ń':'n','ó':'o','ś':'s','ź':'z','ż':'z','Ą':'A','Ę':'E','Ł':'L','Ń':'N','Ó':'O','Ś':'S','Ź':'Z','Ż':'Z'}[c] || c));

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(14);
    doc.text(toAscii('WEZWANIE DO ZAPLATY'), 105, 25, { align: 'center' });

    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    const lines = doc.splitTextToSize(toAscii(body), 170);
    doc.text(lines, 20, 40);

    doc.setFontSize(8);
    doc.setTextColor(120);
    doc.text(toAscii(`Wygenerowano: ${new Date().toLocaleString('pl-PL')} | GetMyPermit CRM`), 20, 285);

    doc.save(`wezwanie_${toAscii(params.case_number)}_${Date.now()}.pdf`);

    await db.from('gmp_collection_activities').insert({
        collection_id: collectionId, case_id: c.case_id,
        activity_type: 'letter',
        subject: level === 'demand_final' ? 'Ostateczne wezwanie' : 'Wezwanie #1',
        content: `PDF wezwania (${level}). Kwota: ${total.toFixed(2)} PLN z odsetkami.`,
        metadata: { amount: Number(c.remaining_amount), interest, total, days_overdue: age },
        created_by: window.currentStaff?.id,
    });
    await db.from('gmp_collections').update({
        last_contact_at: new Date().toISOString(),
        attempted_letters: (c.attempted_letters || 0) + 1,
    }).eq('id', collectionId);

    toast.success('PDF wygenerowany');
    await loadCollections();
    render();
}

async function runAutomation() {
    if (!confirm('Uruchomić automatyzację windykacji?\n\nEskaluje poziomy (30/60/90/120/150/365 dni), utworzy zadania dla opiekunów i powiadomi ich. Bezpieczne - zerowa wysyłka automatyczna, tylko zadania do wykonania.')) return;
    toast.info('Przetwarzanie...');
    const { data, error } = await db.rpc('gmp_process_collections_reminders');
    if (error) { toast.error(error.message); return; }
    const r = data?.[0] || {};
    toast.success(`Eskalowano: ${r.escalated_count} · zadań: ${r.tasks_created} · obietnic niedotrzymanych: ${r.promise_broken_count} · powiadomień: ${r.notifications_sent}`);
    await loadCollections();
    render(); renderKPIs();
}

async function refreshPriorities() {
    toast.info('Przeliczanie...');
    for (const c of allCollections) {
        const age = getAgeDays(c);
        let ageScore = 30;
        if (age === null) ageScore = 20;
        else if (age <= 30) ageScore = 5;
        else if (age <= 90) ageScore = 15;
        else if (age <= 180) ageScore = 30;
        else if (age <= 365) ageScore = 40;
        else ageScore = 25;
        const amountScore = Math.min(40, Math.sqrt(Number(c.remaining_amount)) / 2);
        const priority = Math.round(ageScore + amountScore + c.probability_score * 0.3);
        if (priority !== c.priority_score) {
            await db.from('gmp_collections').update({ priority_score: priority }).eq('id', c.collection_id);
        }
    }
    toast.success('Przeliczono');
    await loadCollections();
    render(); renderKPIs();
}
