<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sprawy - GetMyPermit CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], mono: ['JetBrains Mono','monospace'] } } } }</script>
    <link rel="stylesheet" href="components/layout.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <meta name="x-sentry-dsn" content="https://6f0737fc66f36bbdc9806377bee380b8@o4511314588205056.ingest.de.sentry.io/4511314611667024">
    <script src="components/sentry.js"></script>
    <script src="components/supabase.js"></script>
    <script src="components/auth.js"></script>
    <script src="components/haptic.js" defer></script>
    <script src="components/pull-to-refresh.js" defer></script>
    <script src="components/modals.js" defer></script>
    <script src="components/bulk-modal.js" defer></script>
    <script src="components/tags.js" defer></script>

<body>
<div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <main class="app-main">
        <div class="page-header">
            <div>
                <h1 class="page-title">Sprawy</h1>
                <p class="page-subtitle" id="page-count">Ładuję...</p>
            </div>
            <div class="flex gap-2">
                <button class="btn btn-secondary" onclick="exportCSV()">
                    <i class="ph ph-download-simple"></i> CSV
                </button>
                <a href="case-new.html" class="btn btn-primary">
                    <i class="ph ph-plus"></i> Nowa sprawa
                </a>
                <button class="btn btn-secondary btn-sm" onclick="openNewCaseModal()" title="Szybki tryb (1-step modal)">
                    <i class="ph ph-lightning"></i>
                </button>
            </div>
        </div>

        <!-- Pawel v3.2 — Banner szkiców (C2) -->
        <div id="drafts-banner" class="hidden p-3 mb-3 rounded border-l-4 border-amber-500 bg-amber-500/5 flex items-center gap-3">
            <i class="ph ph-warning-circle text-amber-400 text-xl"></i>
            <div class="flex-1 text-sm">
                <span class="text-amber-200">Masz <strong id="drafts-count">0</strong> niedokończonych szkiców spraw</span>
                <span class="text-zinc-500 text-xs ml-2">(z ostatnich 7 dni)</span>
            </div>
            <button class="btn btn-sm btn-secondary" onclick="filterDrafts()">Pokaż szkice</button>
            <button class="btn btn-sm btn-ghost" onclick="document.getElementById('drafts-banner').classList.add('hidden')" title="Ukryj">
                <i class="ph ph-x"></i>
            </button>
        </div>

        <!-- Szybkie zakładki -->
        <div class="flex gap-1 mb-3 flex-wrap">
            <button class="btn btn-secondary tab-btn active" data-preset="">Wszystkie</button>
            <button class="btn btn-secondary tab-btn" data-preset="przyjete">Sprawy przyjęte</button>
            <button class="btn btn-secondary tab-btn" data-preset="aktywne">Aktywne</button>
            <button class="btn btn-secondary tab-btn" data-preset="do-zlozenia">Do złożenia</button>
            <button class="btn btn-secondary tab-btn" data-preset="osobiste">Oczekujące osobistego</button>
            <button class="btn btn-secondary tab-btn" data-preset="po-osobistym">Po osobistym</button>
            <button class="btn btn-secondary tab-btn" data-preset="oczek-decyzji">Oczekują decyzji</button>
            <button class="btn btn-secondary tab-btn" data-preset="odwolania">Odwołania</button>
            <button class="btn btn-secondary tab-btn" data-preset="zakonczone">Zakończone</button>
        </div>

        <!-- Filtry -->
        <div class="card p-4 mb-4">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 xl:grid-cols-6 gap-3">
                <div>
                    <label>Szukaj</label>
                    <input type="text" id="f-search" class="filter-input w-full" placeholder="Nazwisko, imię, nr sprawy, znak sprawy...">
                </div>
                <div>
                    <label>Status</label>
                    <select id="f-status" class="filter-input w-full">
                        <option value="">Wszystkie</option>
                        <option value="lead">Lead</option>
                        <option value="zlecona">Zlecona</option>
                        <option value="aktywna">Aktywna</option>
                        <option value="zakonczona">Zakończona</option>
                        <option value="archiwum">Archiwum</option>
                    </select>
                </div>
                <div>
                    <label>Etap</label>
                    <select id="f-stage" class="filter-input w-full">
                        <option value="">Wszystkie</option>
                        <option value="weryfikacja_dokumentow">Weryfikacja dok.</option>
                        <option value="zlozenie_wniosku">Złożenie wniosku</option>
                        <option value="oczekiwanie_na_osobiste">Oczek. na osobiste</option>
                        <option value="wyznaczono_termin">Wyznaczony termin</option>
                        <option value="po_osobistym">Po osobistym</option>
                        <option value="oczekiwanie_na_decyzje">Oczek. decyzji</option>
                        <option value="zakonczenie">Zakończenie</option>
                        <option value="odwolanie">Odwołanie</option>
                        <option value="umorzenie">Umorzenie</option>
                        <option value="przystapienie">Przystąpienie</option>
                        <option value="wezwanie">Wezwanie</option>
                        <option value="uzupelnienie_dokumentow">Uzupełnienie dokumentów</option>
                        <option value="przyspieszenie">Przyspieszenie</option>
                        <option value="wydluzenie_terminu">Wydłużenie terminu</option>
                        <option value="przeniesienie_z_innego_wojewodztwa">Przeniesienie z innego województwa</option>
                        <option value="wniosek_przeniesiony">Wniosek przeniesiony</option>
                    </select>
                </div>
                <div>
                    <label>Kategoria</label>
                    <select id="f-category" class="filter-input w-full">
                        <option value="">Wszystkie</option>
                        <!-- opcje ładowane dynamicznie z gmp_case_categories -->
                    </select>
                </div>
                <div>
                    <label>Opiekun</label>
                    <select id="f-staff" class="filter-input w-full">
                        <option value="">Wszyscy</option>
                    </select>
                </div>
                <div>
                    <label>Oddział</label>
                    <select id="f-department" class="filter-input w-full">
                        <option value="">Wszystkie</option>
                    </select>
                </div>
                <div>
                    <label>Pracodawca</label>
                    <select id="f-employer" class="filter-input w-full">
                        <option value="">Wszyscy</option>
                    </select>
                </div>
                <div>
                    <label>Grupa</label>
                    <select id="f-group" class="filter-input w-full">
                        <option value="">Wszystkie</option>
                    </select>
                </div>
                <div>
                    <label>Metoda złożenia</label>
                    <select id="f-method" class="filter-input w-full">
                        <option value="">Wszystkie</option>
                        <option value="osobiscie">Osobiście</option>
                        <option value="elektronicznie">Elektronicznie</option>
                        <option value="pocztowo">Pocztowo</option>
                        <option value="przeniesienie">Przeniesienie</option>
                    </select>
                </div>
                <div>
                    <label>Data przyjęcia OD</label>
                    <input type="date" id="f-date-from" class="filter-input w-full">
                </div>
                <div>
                    <label>Data przyjęcia DO</label>
                    <input type="date" id="f-date-to" class="filter-input w-full">
                </div>
                <div class="flex items-end gap-2 xl:col-span-3">
                    <button class="btn btn-secondary flex-1" onclick="resetFilters()">
                        <i class="ph ph-eraser"></i> Wyczyść
                    </button>
                </div>
            </div>
        </div>

        <!-- Saved views -->
        <div id="saved-views-bar" class="mb-3"></div>

        <!-- Tag filter chips -->
        <div id="tag-filter-bar" class="flex items-center gap-2 mb-3 flex-wrap">
            <span class="text-xs text-zinc-500 flex items-center gap-1"><i class="ph ph-tag"></i> Tagi:</span>
            <div id="tag-filters" class="flex gap-1 flex-wrap"></div>
        </div>

        <!-- Bulk actions bar -->
        <div id="bulk-bar" class="hidden card p-3 mb-3" style="background: var(--accent-subtle); border-color: var(--accent-border)">
            <div class="flex items-center gap-2 flex-wrap bulk-bar-content">
                <span class="text-sm text-white flex items-center gap-2 mr-2 bulk-count-label"><i class="ph ph-check-square-offset text-accent"></i> Zaznaczono <span id="bulk-count" class="font-bold">0</span></span>
                <button class="btn btn-secondary btn-sm" onclick="bulkAssignStaff()"><i class="ph ph-user"></i> <span class="hide-sm">Opiekun</span></button>
                <button class="btn btn-secondary btn-sm" onclick="bulkChangeStatus()"><i class="ph ph-flag"></i> <span class="hide-sm">Status</span></button>
                <button class="btn btn-secondary btn-sm" onclick="bulkChangeStage()"><i class="ph ph-stack"></i> <span class="hide-sm">Etap</span></button>
                <button class="btn btn-secondary btn-sm" onclick="bulkChangeCategory()"><i class="ph ph-tag"></i> <span class="hide-sm">Kategoria</span></button>
                <button class="btn btn-secondary btn-sm" onclick="bulkAddTag()"><i class="ph ph-plus-circle"></i> <span class="hide-sm">Tag</span></button>
                <button class="btn btn-secondary btn-sm" onclick="bulkPin()"><i class="ph ph-push-pin"></i> <span class="hide-sm">Przypnij</span></button>
                <button class="btn btn-secondary btn-sm text-red-400" onclick="bulkDelete()"><i class="ph ph-trash"></i> <span class="hide-sm">Usuń</span></button>
                <button class="btn btn-ghost btn-sm ml-auto" onclick="clearSelection()">Wyczyść</button>
            </div>
        </div>
        <style>@media (max-width: 600px) { .hide-sm { display: none; } .bulk-count-label { width: 100%; margin-right: 0 !important; margin-bottom: 4px; } }</style>

        <!-- Tabela -->
        <div class="card overflow-hidden">
            <div class="overflow-x-auto max-h-[calc(100vh-300px)] overflow-y-auto">
                <table class="gmp-table gmp-table-mobile-cards">
                    <thead>
                        <tr>
                            <th class="w-8"><input type="checkbox" id="sel-all" title="Zaznacz wszystkie"></th>
                            <th class="w-6"></th>
                            <th class="w-32" data-sort="case_number">Nr / Znak</th>
                            <th data-sort="client">Klient</th>
                            <th data-sort="employer">Pracodawca</th>
                            <th data-sort="case_type">Tryb sprawy</th>
                            <th data-sort="category">Kat.</th>
                            <th data-sort="status">Status</th>
                            <th data-sort="stage">Etap</th>
                            <th data-sort="staff">Opiekun</th>
                            <th>Tagi</th>
                            <th data-sort="date_accepted">Przyjęta</th>
                            <th data-sort="date_joined" title="Dni od przystąpienia do sprawy">Dni od przyst.</th>
                            <th data-sort="date_submitted">Złożony</th>
                            <th data-sort="legal_stay_end_date">Koniec legalu</th>
                            <th class="text-right" data-sort="balance_due">Zaległość</th>
                            <th class="text-right" data-sort="date_last_activity">Ostatnia akt.</th>

                    </thead>

            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </main>
    <!-- FAB mobile: nowa sprawa -->
    <a href="case-new.html" class="gmp-fab" aria-label="Nowa sprawa" title="Nowa sprawa">

<style>.tab-btn{padding:0.4rem 0.75rem;font-size:0.8rem}.tab-btn.active{background:white;color:black}</style>
<script src="components/sidebar.js" data-active="cases"></script>
<script>
const PAGE_SIZE = 50;

const PRESETS = {
    '': {},
    'przyjete': { status: 'zlecona' },
    'aktywne': { status: 'aktywna' },
    'do-zlozenia': { stage: 'zlozenie_wniosku' },
    'osobiste': { stage: 'oczekiwanie_na_osobiste' },
    'po-osobistym': { stage: 'po_osobistym' },
    'oczek-decyzji': { stage: 'oczekiwanie_na_decyzje' },
    'odwolania': { stage: 'odwolanie' },
    'zakonczone': { status: 'zakonczona' },
};
let currentPage = 1;
let totalRows = 0;
let currentFilters = {};
let staffList = [];
let deptList = [];

document.addEventListener('gmp-auth-ready', init);
window.addEventListener('load', () => window.gmpPullRefresh?.init(() => loadCases()));

async function init() {
    // Ustaw filtry z URL query
    const params = new URLSearchParams(window.location.search);
    ['status', 'stage', 'category', 'staff', 'department', 'method', 'date-from', 'date-to', 'search'].forEach(k => {
        const v = params.get(k);
        if (v) document.getElementById('f-' + k).value = v;
    });

    await loadFilters();
    await renderTagFilters();

    // Saved views
    if (window.gmpSavedViews) {
        gmpSavedViews.init({
            page: 'cases',
            container: document.getElementById('saved-views-bar'),
            getCurrentFilters: () => ({
                search: document.getElementById('f-search').value,
                status: document.getElementById('f-status').value,
                stage: document.getElementById('f-stage').value,
                category: document.getElementById('f-category').value,
                staff: document.getElementById('f-staff').value,
                department: document.getElementById('f-department').value,
                employer: document.getElementById('f-employer').value,
                group: document.getElementById('f-group')?.value || '',
                method: document.getElementById('f-method').value,
                date_from: document.getElementById('f-date-from').value,
                date_to: document.getElementById('f-date-to').value,
                tags: [...activeTagFilters],
            }),
            applyFilters: (f) => {
                document.getElementById('f-search').value = f.search || '';
                document.getElementById('f-status').value = f.status || '';
                document.getElementById('f-stage').value = f.stage || '';
                document.getElementById('f-category').value = f.category || '';
                document.getElementById('f-staff').value = f.staff || '';
                document.getElementById('f-department').value = f.department || '';
                document.getElementById('f-employer').value = f.employer || '';
                if (document.getElementById('f-group')) document.getElementById('f-group').value = f.group || '';
                document.getElementById('f-method').value = f.method || '';
                document.getElementById('f-date-from').value = f.date_from || '';
                document.getElementById('f-date-to').value = f.date_to || '';
                activeTagFilters = f.tags || [];
                currentPage = 1;
                renderTagFilters();
                loadCases();
            },
        });
    }

    await loadCases();

    // Pawel v3.2 — Banner szkiców (C2)
    loadDraftsBanner();

    // Obsluga filtrow
    ['f-status', 'f-stage', 'f-category', 'f-staff', 'f-department', 'f-employer', 'f-group', 'f-method', 'f-date-from', 'f-date-to'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', () => { currentPage = 1; loadCases(); });
    });

    // Presety zakładek
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            const preset = b.dataset.preset;
            // Wyzeruj filtry status+stage, zastosuj preset
            document.getElementById('f-status').value = '';
            document.getElementById('f-stage').value = '';
            const p = PRESETS[preset] || {};
            if (p.status) document.getElementById('f-status').value = p.status;
            if (p.stage) document.getElementById('f-stage').value = p.stage;
            currentPage = 1;
            loadCases();
        });
    });

    // Preset z URL (np. ?preset=osobiste)
    const presetParam = params.get('preset');
    if (presetParam) {
        const btn = document.querySelector(`.tab-btn[data-preset="${presetParam}"]`);
        if (btn) btn.click();
    }

    // Select all
    document.getElementById('sel-all').addEventListener('change', (e) => {
        document.querySelectorAll('.case-chk').forEach(c => c.checked = e.target.checked);
        updateBulkBar();
    });

    // Sortowanie kolumn
    const thead = document.querySelector('.gmp-table thead');
    thead.querySelectorAll('th[data-sort]').forEach(th => {
        let dir = null;
        th.addEventListener('click', () => {
            thead.querySelectorAll('th').forEach(t => t.classList.remove('sort-asc', 'sort-desc'));
            dir = dir === 'asc' ? 'desc' : 'asc';
            th.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');
            const key = th.dataset.sort;
            const getters = {
                case_number: r => r.case_number || r.znak_sprawy || '',
                client: r => r.gmp_clients ? r.gmp_clients.last_name + ' ' + r.gmp_clients.first_name : '',
                employer: r => r.gmp_employers?.name || '',
                case_type: r => r.case_type || '',
                category: r => r.category || '',
                status: r => r.status || '',
                stage: r => r.stage || '',
                staff: r => r.gmp_staff?.full_name || '',
                date_accepted: r => r.date_accepted || '',
                date_joined: r => r.date_joined ? -new Date(r.date_joined).getTime() : Number.POSITIVE_INFINITY,
                date_submitted: r => r.date_submitted || '',
                legal_stay_end_date: r => r.legal_stay_end_date || '',
                balance_due: r => Number(balanceByCase[r.id]?.balance_due || 0),
                fee_amount: r => Number(r.fee_amount) || 0,
                date_last_activity: r => r.date_last_activity || '',
            };
            const getter = getters[key];
            if (!getter) return;
            currentData.sort((a, b) => {
                const va = getter(a), vb = getter(b);
                if (typeof va === 'number' && typeof vb === 'number') return dir === 'asc' ? va - vb : vb - va;
                return dir === 'asc' ? String(va).localeCompare(String(vb), 'pl') : String(vb).localeCompare(String(va), 'pl');
            });
            renderRows();
        });
    });
    let searchTimer;
    document.getElementById('f-search').addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { currentPage = 1; loadCases(); }, 300);
    });
}

async function loadFilters() {
    const [{ data: staff }, { data: depts }, { data: emps }, { data: cats }, { data: groups }] = await Promise.all([
        db.from('gmp_staff').select('id, full_name').eq('is_active', true).order('full_name'),
        db.from('gmp_office_departments').select('id, code, name').order('code'),
        db.from('gmp_employers').select('id, name').order('name').limit(1000),
        // Ładujemy WSZYSTKIE kategorie (łącznie z legacy) — dropdown pokazuje tylko aktywne,
        // ale lista labelek potrzebuje też legacy (żeby stare sprawy miały ładną etykietę zamiast raw code)
        db.from('gmp_case_categories').select('code, label, group_label, is_active').order('sort_order'),
        // Etap V — grupy spraw (pracodawca/rodzina/projekt/etc)
        db.from('gmp_case_groups').select('id, name, type').eq('is_active', true).order('name'),
    ]);
    staffList = staff || [];
    deptList = depts || [];
    const staffSel = document.getElementById('f-staff');
    staffList.forEach(s => {
        const o = document.createElement('option');
        o.value = s.id; o.textContent = s.full_name;
        staffSel.appendChild(o);
    });
    const deptSel = document.getElementById('f-department');
    deptList.forEach(d => {
        const o = document.createElement('option');
        o.value = d.id; o.textContent = d.code + (d.name ? ` — ${d.name}` : '');
        deptSel.appendChild(o);
    });
    const empSel = document.getElementById('f-employer');
    (emps || []).forEach(e => {
        const o = document.createElement('option');
        o.value = e.id; o.textContent = e.name;
        empSel.appendChild(o);
    });
    // Etap V — grupy spraw (Pracodawca: NAME · Rodzina: NAME · ...)
    const grpSel = document.getElementById('f-group');
    if (grpSel) {
        const TYPE_LBL = { pracodawca: 'Pracodawca', rodzina: 'Rodzina', projekt: 'Projekt', rozliczenie_zbiorcze: 'Rozliczenie', inna: 'Inna' };
        (groups || []).forEach(g => {
            const o = document.createElement('option');
            o.value = g.id;
            o.textContent = `${TYPE_LBL[g.type] || g.type}: ${g.name}`;
            grpSel.appendChild(o);
        });
    }
    // Kategorie z DB (grupowane po group_label) — tylko aktywne w dropdown
    const catSel = document.getElementById('f-category');
    const activeCats = (cats || []).filter(c => c.is_active);
    const catsByGroup = {};
    activeCats.forEach(c => {
        (catsByGroup[c.group_label] = catsByGroup[c.group_label] || []).push(c);
    });
    Object.entries(catsByGroup).forEach(([group, items]) => {
        const og = document.createElement('optgroup');
        og.label = group;
        items.forEach(c => {
            const o = document.createElement('option');
            o.value = c.code; o.textContent = c.label;
            og.appendChild(o);
        });
        catSel.appendChild(og);
    });
    // Lista WSZYSTKICH (łącznie z legacy) — potrzebna do renderowania etykiet w liście
    window.CATEGORIES_LIST = cats || [];
}

// Wspólna lista pól SELECT dla cases.html — używana w buildQuery i rebuild-after-search
const CASES_SELECT_COLUMNS = 'id, case_number, znak_sprawy, status, stage, case_type, category, submission_method, date_accepted, date_submitted, date_joined, legal_stay_end_date, date_last_activity, fee_amount, assigned_to, client_id, employer_id, department_id, is_pinned, gmp_clients(last_name, first_name), gmp_employers(name), gmp_staff!assigned_to(full_name), gmp_office_departments(code)';

// Zwraca pre-filtry (clientIdFilter, tagCaseIds, groupCaseIds) — używane w loadCases i exportCSV
async function resolvePreFilters() {
    const search = document.getElementById('f-search').value.trim();
    let clientIdFilter = null;
    if (search && search.length >= 2) {
        const s = `%${search}%`;
        const { data: matchedClients } = await db.from('gmp_clients')
            .select('id').or(`last_name.ilike.${s},first_name.ilike.${s}`).limit(500);
        if (matchedClients?.length) clientIdFilter = matchedClients.map(c => c.id);
    }
    let tagCaseIds = null;
    if (activeTagFilters.length) {
        const { data: tagRows } = await db.from('gmp_entity_tags')
            .select('entity_id, tag_id').eq('entity_type', 'case').in('tag_id', activeTagFilters);
        const counts = {};
        (tagRows || []).forEach(r => counts[r.entity_id] = (counts[r.entity_id] || 0) + 1);
        tagCaseIds = Object.entries(counts)
            .filter(([_, cnt]) => cnt === activeTagFilters.length).map(([id]) => id);
        if (!tagCaseIds.length) tagCaseIds = ['00000000-0000-0000-0000-000000000000']; // wymuś pusty wynik
    }
    // Etap V — filtr Grupa: pre-fetch case IDs z gmp_case_group_members
    let groupCaseIds = null;
    const groupId = document.getElementById('f-group')?.value;
    if (groupId) {
        const { data: members } = await db.from('gmp_case_group_members')
            .select('case_id').eq('group_id', groupId);
        groupCaseIds = (members || []).map(m => m.case_id);
        if (!groupCaseIds.length) groupCaseIds = ['00000000-0000-0000-0000-000000000000'];
    }
    return { search, clientIdFilter, tagCaseIds, groupCaseIds };
}

function buildQuery() {
    let q = db.from('gmp_cases').select(
        CASES_SELECT_COLUMNS,
        { count: 'exact' }
    );

    const search = document.getElementById('f-search').value.trim();
    if (search) {
        // Szukaj w case_number, znak_sprawy albo w client imie/nazwisko
        // PostgREST ograniczenie: or() nie przejdzie przez FK, wiec robimy 2 zapytania i laczymy, albo fulltext
        // Uproszczenie: szukamy po case_number/znak_sprawy OR client name. Użyjemy .or() z ilike.
        const s = `%${search}%`;
        q = q.or(`case_number.ilike.${s},znak_sprawy.ilike.${s}`);
    }

    const status = document.getElementById('f-status').value;
    if (status) q = q.eq('status', status);

    const stage = document.getElementById('f-stage').value;
    if (stage) q = q.eq('stage', stage);

    const category = document.getElementById('f-category').value;
    if (category) q = q.eq('category', category);

    const staff = document.getElementById('f-staff').value;
    if (staff) q = q.eq('assigned_to', staff);

    const dept = document.getElementById('f-department').value;
    if (dept) q = q.eq('department_id', dept);

    const emp = document.getElementById('f-employer').value;
    if (emp) q = q.eq('employer_id', emp);

    const method = document.getElementById('f-method').value;
    if (method) q = q.eq('submission_method', method);

    const dFrom = document.getElementById('f-date-from').value;
    if (dFrom) q = q.gte('date_accepted', dFrom);

    const dTo = document.getElementById('f-date-to').value;
    if (dTo) q = q.lte('date_accepted', dTo);

    return q;
}

async function loadCases() {
    const tbody = document.getElementById('cases-tbody');
    tbody.innerHTML = '<tr><td colspan="18" class="p-6 text-center text-zinc-500"><span class="spinner mr-2"></span>Ładuję...</td></tr>';

    const search = document.getElementById('f-search').value.trim();

    // Tag filter: pre-fetch case_ids z wybranymi tagami (AND między tagami)
    let tagCaseIds = null;
    if (activeTagFilters.length) {
        const { data: tagRows } = await db.from('gmp_entity_tags')
            .select('entity_id, tag_id')
            .eq('entity_type', 'case')
            .in('tag_id', activeTagFilters);
        const counts = {};
        (tagRows || []).forEach(r => counts[r.entity_id] = (counts[r.entity_id] || 0) + 1);
        tagCaseIds = Object.entries(counts)
            .filter(([_, cnt]) => cnt === activeTagFilters.length)
            .map(([id, _]) => id);
        if (!tagCaseIds.length) {
            totalRows = 0;
            document.getElementById('page-count').textContent = '0 spraw (brak z wybranymi tagami)';
            tbody.innerHTML = '<tr><td colspan="18" class="empty-state"><i class="ph ph-tag"></i><div>Brak spraw z wybranymi tagami</div></td></tr>';
            renderPagination();
            return;
        }
    }

    // Strategia dla search po client name: najpierw znajdujemy client_id, potem filtrujemy
    let clientIdFilter = null;
    if (search && search.length >= 2) {
        const s = `%${search}%`;
        const { data: matchedClients } = await db
            .from('gmp_clients')
            .select('id')
            .or(`last_name.ilike.${s},first_name.ilike.${s}`)
            .limit(500);
        if (matchedClients?.length) {
            clientIdFilter = matchedClients.map(c => c.id);
        }
    }

    let q = buildQuery();

    // Jesli search znalazl klientow, rozszerz filter
    if (clientIdFilter?.length) {
        // Re-build query - używamy tej samej listy pól co buildQuery
        q = db.from('gmp_cases').select(CASES_SELECT_COLUMNS, { count: 'exact' });
        const s = `%${search}%`;
        const inList = `(${clientIdFilter.join(',')})`;
        q = q.or(`case_number.ilike.${s},znak_sprawy.ilike.${s},client_id.in.${inList}`);
        // Re-apply pozostale filtry
        const status = document.getElementById('f-status').value;
        if (status) q = q.eq('status', status);
        const stage = document.getElementById('f-stage').value;
        if (stage) q = q.eq('stage', stage);
        const category = document.getElementById('f-category').value;
        if (category) q = q.eq('category', category);
        const staff = document.getElementById('f-staff').value;
        if (staff) q = q.eq('assigned_to', staff);
        const dept = document.getElementById('f-department').value;
        if (dept) q = q.eq('department_id', dept);
        const method = document.getElementById('f-method').value;
        if (method) q = q.eq('submission_method', method);
        const dFrom = document.getElementById('f-date-from').value;
        if (dFrom) q = q.gte('date_accepted', dFrom);
        const dTo = document.getElementById('f-date-to').value;
        if (dTo) q = q.lte('date_accepted', dTo);
    }

    // Tag filter
    if (tagCaseIds) q = q.in('id', tagCaseIds);

    // Etap V — Filtr Grupa (pre-fetched case IDs z gmp_case_group_members)
    const groupId = document.getElementById('f-group')?.value;
    if (groupId) {
        const { data: members } = await db.from('gmp_case_group_members')
            .select('case_id').eq('group_id', groupId);
        const groupIds = (members || []).map(m => m.case_id);
        if (groupIds.length) q = q.in('id', groupIds);
        else q = q.in('id', ['00000000-0000-0000-0000-000000000000']);
    }

    const from = (currentPage - 1) * PAGE_SIZE;
    const to = from + PAGE_SIZE - 1;
    q = q.order('is_pinned', { ascending: false })
         .order('date_last_activity', { ascending: false, nullsFirst: false })
         .order('created_at', { ascending: false })
         .range(from, to);

    const { data, error, count } = await q;
    if (error) {
        tbody.innerHTML = `<tr><td colspan="18" class="p-6 text-center text-red-400">Błąd: ${esc(error.message)}</td></tr>`;
        return;
    }

    totalRows = count || 0;
    document.getElementById('page-count').textContent = `${fmt.num(totalRows)} spraw`;

    if (!data?.length) {
        tbody.innerHTML = '<tr><td colspan="18" class="empty-state"><i class="ph ph-folder-open"></i><div>Brak spraw dla tych filtrów</div></td></tr>';
        renderPagination();
        return;
    }

    currentData = data;
    // Fetch tagów dla wszystkich spraw na stronie
    tagsByCase = window.gmpTags ? await gmpTags.fetchForEntities('case', data.map(r => r.id)) : {};
    // Fetch saldo z gmp_case_balance
    balanceByCase = {};
    if (data.length) {
        const { data: balances } = await db.from('gmp_case_balance')
            .select('case_id, balance_due, overdue_installments_amount, overdue_installments_count')
            .in('case_id', data.map(r => r.id));
        (balances || []).forEach(b => { balanceByCase[b.case_id] = b; });
    }
    renderRows();
    renderPagination();
}

        const nr = row.case_number || (row.znak_sprawy ? row.znak_sprawy.slice(-20) : row.id.slice(0, 8));
        const caseTags = tagsByCase[row.id] || [];
        const tagsHTML = caseTags.length

                <td data-label="" onclick="togglePin('${row.id}', ${row.is_pinned ? 'true' : 'false'}); event.stopPropagation();" style="cursor: pointer; min-width: 44px; text-align: center">
                    <i class="ph ${row.is_pinned ? 'ph-fill ph-push-pin text-amber-400' : 'ph-push-pin text-zinc-700'} text-lg" title="${row.is_pinned ? 'Odepnij' : 'Przypnij'}"></i>

                <td data-label="Status" data-edit-status="${row.id}" data-val="${esc(row.status || '')}" onclick="event.stopPropagation()"><span class="badge badge-${row.status}">${esc(row.status || '—')}</span></td>
                <td data-label="Etap" class="text-xs" data-edit-stage="${row.id}" data-val="${esc(row.stage || '')}" onclick="event.stopPropagation()">${row.stage ? `<span class="badge badge-stage">${esc(row.stage)}</span>` : '<span class="text-zinc-600">—</span>'}</td>
                <td data-label="Opiekun" class="text-zinc-300 text-xs" data-edit-staff="${row.id}" data-val="${esc(row.assigned_to || '')}" onclick="event.stopPropagation()"><div class="flex items-center gap-2">${staffAva}<span>${staff}</span></div></td>

                ${(() => {
                    if (!row.date_joined) return '<td data-label="Dni od przyst." class="text-zinc-700 text-xs">—</td>';
                    const days = Math.floor((Date.now() - new Date(row.date_joined).getTime()) / 86400000);
                    const color = days > 180 ? 'text-red-400' : days > 90 ? 'text-amber-300' : 'text-zinc-400';
                    return `<td data-label="Dni od przyst." class="${color} text-xs font-mono" title="Przystąpienie: ${fmt.date(row.date_joined)}">${days}d</td>`;
                })()}
                <td data-label="Złożony" class="text-zinc-500 text-xs">${fmt.date(row.date_submitted)}</td>
                <td data-label="Koniec legalu" class="text-xs ${row.legal_stay_end_date && new Date(row.legal_stay_end_date) < new Date() ? 'text-red-400 font-semibold' : 'text-zinc-400'}">${fmt.date(row.legal_stay_end_date)}</td>
                ${(() => {
                    const bal = balanceByCase[row.id] || {};
                    const due = Number(bal.balance_due || 0);
                    const overdue = Number(bal.overdue_installments_amount || 0);
                    if (due <= 0.009 && overdue <= 0.009) {
                        return `<td data-label="Zaległość" class="text-right text-zinc-600 text-xs">—</td>`;
                    }
                    const isOverdue = overdue > 0.009;
                    const color = isOverdue ? 'text-red-400' : 'text-amber-300';
                    const dot = isOverdue ? '<span class="inline-block w-2 h-2 rounded-full bg-red-500 mr-1" title="Przeterminowana rata"></span>' : '';
                    return `<td data-label="Zaległość" class="text-right font-mono text-xs ${color}" title="${isOverdue ? 'Przeterminowane raty: ' + fmt.money(overdue) : 'Saldo: ' + fmt.money(due)}">${dot}${fmt.money(due)}</td>`;
                })()}
                <td data-label="Ostatnia akt." class="text-right text-zinc-500 text-xs">${fmt.daysAgo(row.date_last_activity)}</td>
                <td class="row-open">${window.rowOpen()}</td>
            </tr>`;
    }).join('');

    // Cały wiersz klikalny - navigacja do case.html
    tbody.querySelectorAll('tr.clickable').forEach(tr => {
        tr.addEventListener('click', () => window.location.href = 'case.html?id=' + tr.dataset.id);
    });

        chk.addEventListener('change', updateBulkBar);
    });
    attachInlineEdits();

function updateBulkBar() {
    const selected = document.querySelectorAll('.case-chk:checked');
    const bar = document.getElementById('bulk-bar');
    if (selected.length > 0) {

        document.getElementById('bulk-count').textContent = selected.length;

// ======== TAG FILTERS ========
async function renderTagFilters() {
    const all = await gmpTags.loadAll();
    const el = document.getElementById('tag-filters');
    if (!all.length) { el.innerHTML = '<span class="text-xs text-zinc-600">brak tagów</span>'; return; }
    el.innerHTML = all.map(t => {
        const active = activeTagFilters.includes(t.id);
        return `<button class="tag-chip tag-chip-sm" data-tag-id="${t.id}" style="--tag-color: ${t.color}; ${active ? 'box-shadow: 0 0 0 1.5px ' + t.color : 'opacity: 0.55'}; cursor: pointer">
            <span class="tag-dot"></span>${esc(t.name)}
        </button>`;
    }).join('');
    el.querySelectorAll('[data-tag-id]').forEach(btn => btn.addEventListener('click', () => {
        const id = btn.dataset.tagId;
        const idx = activeTagFilters.indexOf(id);
        if (idx >= 0) activeTagFilters.splice(idx, 1);
        else activeTagFilters.push(id);
        currentPage = 1;
        renderTagFilters();
        loadCases();
    }));
}

async function bulkAddTag() {

    if (!ids.length) return;
    const allTags = await gmpTags.loadAll();
    gmpBulk.open({
        title: 'Dodaj tag do spraw',
        count: ids.length,
        fields: [
            {
                type: 'select', name: 'tag_id', label: 'Tag', required: true,

            },

async function bulkDelete() {

function renderPagination() {
    const totalPages = Math.ceil(totalRows / PAGE_SIZE);
    const container = document.getElementById('pagination');
    if (totalPages <= 1) { container.innerHTML = ''; return; }

    let html = `<button onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}><i class="ph ph-caret-double-left"></i></button>`;
    html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="ph ph-caret-left"></i></button>`;

    const start = Math.max(1, currentPage - 2);
    const end = Math.min(totalPages, currentPage + 2);
    if (start > 1) html += `<button onclick="goToPage(1)">1</button>${start > 2 ? '<span class="text-zinc-600 px-1">…</span>' : ''}`;
    for (let i = start; i <= end; i++) {
        html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
    }
    if (end < totalPages) html += `${end < totalPages - 1 ? '<span class="text-zinc-600 px-1">…</span>' : ''}<button onclick="goToPage(${totalPages})">${totalPages}</button>`;

    html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="ph ph-caret-right"></i></button>`;
    html += `<button onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}><i class="ph ph-caret-double-right"></i></button>`;
    html += `<span class="text-zinc-500 text-xs ml-3">Strona ${currentPage} / ${totalPages}</span>`;
    container.innerHTML = html;
}

function goToPage(p) {
    const totalPages = Math.ceil(totalRows / PAGE_SIZE);
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    loadCases();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetFilters() {

async function exportCSV() {
    toast.info('Eksport do CSV... (max 5000 wierszy)');
    // Respektuj filtr search (client name) i tagi — przed review H3 eksport je ignorował
    const { clientIdFilter, tagCaseIds } = await resolvePreFilters();
    let q = buildQuery();
    if (clientIdFilter?.length) {
        const s = `%${document.getElementById('f-search').value.trim()}%`;
        const inList = `(${clientIdFilter.join(',')})`;
        q = db.from('gmp_cases').select(CASES_SELECT_COLUMNS, { count: 'exact' });
        q = q.or(`case_number.ilike.${s},znak_sprawy.ilike.${s},client_id.in.${inList}`);
        // Re-apply standardowe filtry (ten sam wzorzec co w loadCases)
        const f = (id) => document.getElementById(id).value;
        if (f('f-status')) q = q.eq('status', f('f-status'));
        if (f('f-stage')) q = q.eq('stage', f('f-stage'));
        if (f('f-category')) q = q.eq('category', f('f-category'));
        if (f('f-staff')) q = q.eq('assigned_to', f('f-staff'));
        if (f('f-department')) q = q.eq('department_id', f('f-department'));
        if (f('f-employer')) q = q.eq('employer_id', f('f-employer'));
        if (f('f-method')) q = q.eq('submission_method', f('f-method'));
        if (f('f-date-from')) q = q.gte('date_accepted', f('f-date-from'));
        if (f('f-date-to')) q = q.lte('date_accepted', f('f-date-to'));
    }
    if (tagCaseIds) q = q.in('id', tagCaseIds);
    q = q.limit(5000).order('date_accepted', { ascending: false, nullsFirst: false });
    const { data, error } = await q;
    if (error) { toast.error(error.message); return; }
    if (!data?.length) { toast.warning('Brak danych do eksportu'); return; }

    // Dołącz saldo z view gmp_case_balance dla każdej sprawy
    const balMap = {};
    if (data.length) {
        const caseIds = data.map(r => r.id);
        const { data: balances } = await db.from('gmp_case_balance')
            .select('case_id, balance_due, overdue_installments_amount, total_paid')
            .in('case_id', caseIds);
        (balances || []).forEach(b => { balMap[b.case_id] = b; });
    }

    const headers = ['nr_sprawy', 'znak_sprawy', 'klient', 'pracodawca', 'typ', 'kategoria', 'status', 'etap', 'opiekun', 'data_przyjecia', 'data_zlozenia', 'data_przystapienia', 'koniec_legalu', 'wynagrodzenie', 'wplacono', 'zaleglosc', 'przeterm_raty', 'ostatnia_akt'];
    const rows = data.map(r => {
        const b = balMap[r.id] || {};
        return [
            r.case_number || '',
            r.znak_sprawy || '',
            r.gmp_clients ? `${r.gmp_clients.last_name} ${r.gmp_clients.first_name}` : '',
            r.gmp_employers?.name || '',
            r.case_type || '',
            (window.CATEGORIES_LIST || []).find(c => c.code === r.category)?.label || r.category || '',
            r.status || '',
            r.stage || '',
            r.gmp_staff?.full_name || '',
            r.date_accepted || '',
            r.date_submitted || '',
            r.date_joined || '',
            r.legal_stay_end_date || '',
            r.fee_amount || '',
            b.total_paid || '',
            b.balance_due || '',
            b.overdue_installments_amount || '',
            r.date_last_activity || '',
        ];
    });
    const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `sprawy_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast.success('Pobrano ' + data.length + ' wierszy');
}

async function loadDraftsBanner() {
    try {
        const { data: { user } } = await window.supabaseClient.auth.getUser();
        if (!user) return;

        // Znajdź staff_id dla aktualnego user'a
        const { data: staff } = await db.from('gmp_staff')
            .select('id').eq('user_id', user.id).maybeSingle();
        if (!staff) return;

        const sevenDaysAgo = new Date(Date.now() - 7 * 86400 * 1000).toISOString();
        const { count } = await db.from('gmp_cases')
            .select('id', { count: 'exact', head: true })
            .eq('status', 'lead')
            .eq('assigned_to', staff.id)
            .is('kind', null)
            .gte('created_at', sevenDaysAgo);

        if ((count || 0) > 0) {
            document.getElementById('drafts-count').textContent = count;
            document.getElementById('drafts-banner').classList.remove('hidden');
        }
    } catch (e) {
        console.warn('[drafts-banner] error:', e);
    }
}
