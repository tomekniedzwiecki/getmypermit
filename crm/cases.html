<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprawy - GetMyPermit CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/layout.css">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], mono: ['JetBrains Mono','monospace'] } } } }</script>
    <script src="components/supabase.js"></script>
    <script src="components/auth.js"></script>
    <script src="components/modals.js" defer></script>
</head>
<body>
<div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <main class="app-main">
        <div class="page-header">
            <div>
                <h1 class="page-title">Sprawy</h1>
                <p class="page-subtitle" id="page-count">Ładuję...</p>
            </div>
            <div class="flex gap-2">
                <button class="btn btn-secondary" onclick="exportCSV()">
                    <i class="ph ph-download-simple"></i> CSV
                </button>
                <button class="btn btn-primary" onclick="openNewCaseModal()">
                    <i class="ph ph-plus"></i> Nowa sprawa
                </button>
            </div>
        </div>

        <!-- Szybkie zakładki -->
        <div class="flex gap-1 mb-3 flex-wrap">
            <button class="btn btn-secondary tab-btn active" data-preset="">Wszystkie</button>
            <button class="btn btn-secondary tab-btn" data-preset="przyjete">Sprawy przyjęte</button>
            <button class="btn btn-secondary tab-btn" data-preset="aktywne">Aktywne</button>
            <button class="btn btn-secondary tab-btn" data-preset="do-zlozenia">Do złożenia</button>
            <button class="btn btn-secondary tab-btn" data-preset="osobiste">Oczekujące osobistego</button>
            <button class="btn btn-secondary tab-btn" data-preset="po-osobistym">Po osobistym</button>
            <button class="btn btn-secondary tab-btn" data-preset="oczek-decyzji">Oczekują decyzji</button>
            <button class="btn btn-secondary tab-btn" data-preset="odwolania">Odwołania</button>
            <button class="btn btn-secondary tab-btn" data-preset="zakonczone">Zakończone</button>
        </div>

        <!-- Filtry -->
        <div class="card p-4 mb-4">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 xl:grid-cols-6 gap-3">
                <div>
                    <label>Szukaj</label>
                    <input type="text" id="f-search" class="filter-input w-full" placeholder="Nazwisko, imię, nr sprawy, znak sprawy...">
                </div>
                <div>
                    <label>Status</label>
                    <select id="f-status" class="filter-input w-full">
                        <option value="">Wszystkie</option>
                        <option value="lead">Lead</option>
                        <option value="zlecona">Zlecona</option>
                        <option value="aktywna">Aktywna</option>
                        <option value="zakonczona">Zakończona</option>
                        <option value="archiwum">Archiwum</option>
                    </select>
                </div>
                <div>
                    <label>Etap</label>
                    <select id="f-stage" class="filter-input w-full">
                        <option value="">Wszystkie</option>
                        <option value="weryfikacja_dokumentow">Weryfikacja dok.</option>
                        <option value="zlozenie_wniosku">Złożenie wniosku</option>
                        <option value="oczekiwanie_na_osobiste">Oczek. na osobiste</option>
                        <option value="wyznaczono_termin">Wyznaczony termin</option>
                        <option value="po_osobistym">Po osobistym</option>
                        <option value="oczekiwanie_na_decyzje">Oczek. decyzji</option>
                        <option value="zakonczenie">Zakończenie</option>
                        <option value="odwolanie">Odwołanie</option>
                        <option value="umorzenie">Umorzenie</option>
                        <option value="przystapienie">Przystąpienie</option>
                    </select>
                </div>
                <div>
                    <label>Kategoria</label>
                    <select id="f-category" class="filter-input w-full">
                        <option value="">Wszystkie</option>
                        <option value="pobyt">Pobyt</option>
                        <option value="pozostale">Pozostałe</option>
                        <option value="rezydent">Rezydent</option>
                        <option value="zezwolenie_a">Zezwolenie typ A</option>
                        <option value="smart_work">Smart Work</option>
                        <option value="lead_ewidencja">Z ewidencji spotkań</option>
                        <option value="rozliczenie_historyczne">Historyczne (rozliczenia)</option>
                    </select>
                </div>
                <div>
                    <label>Opiekun</label>
                    <select id="f-staff" class="filter-input w-full">
                        <option value="">Wszyscy</option>
                    </select>
                </div>
                <div>
                    <label>Oddział</label>
                    <select id="f-department" class="filter-input w-full">
                        <option value="">Wszystkie</option>
                    </select>
                </div>
                <div>
                    <label>Pracodawca</label>
                    <select id="f-employer" class="filter-input w-full">
                        <option value="">Wszyscy</option>
                    </select>
                </div>
                <div>
                    <label>Metoda złożenia</label>
                    <select id="f-method" class="filter-input w-full">
                        <option value="">Wszystkie</option>
                        <option value="osobiscie">Osobiście</option>
                        <option value="elektronicznie">Elektronicznie</option>
                        <option value="pocztowo">Pocztowo</option>
                        <option value="przeniesienie">Przeniesienie</option>
                    </select>
                </div>
                <div>
                    <label>Data przyjęcia OD</label>
                    <input type="date" id="f-date-from" class="filter-input w-full">
                </div>
                <div>
                    <label>Data przyjęcia DO</label>
                    <input type="date" id="f-date-to" class="filter-input w-full">
                </div>
                <div class="flex items-end gap-2 xl:col-span-3">
                    <button class="btn btn-secondary flex-1" onclick="resetFilters()">
                        <i class="ph ph-eraser"></i> Wyczyść
                    </button>
                </div>
            </div>
        </div>

        <!-- Bulk actions bar -->
        <div id="bulk-bar" class="hidden card p-3 mb-3" style="background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.3)">
            <div class="flex items-center gap-3 flex-wrap">
                <span class="text-sm text-white">Zaznaczono <span id="bulk-count" class="font-bold">0</span> spraw</span>
                <button class="btn btn-secondary btn-sm" onclick="bulkAssignStaff()"><i class="ph ph-user"></i> Przypisz opiekuna</button>
                <button class="btn btn-secondary btn-sm" onclick="bulkChangeStatus()"><i class="ph ph-arrows-left-right"></i> Zmień status</button>
                <button class="btn btn-ghost btn-sm" onclick="document.querySelectorAll('.case-chk').forEach(c => c.checked = false); document.getElementById('sel-all').checked = false; updateBulkBar();">Wyczyść</button>
            </div>
        </div>

        <!-- Tabela -->
        <div class="card overflow-hidden">
            <div class="overflow-x-auto max-h-[calc(100vh-300px)] overflow-y-auto">
                <table class="gmp-table">
                    <thead>
                        <tr>
                            <th class="w-8"><input type="checkbox" id="sel-all" title="Zaznacz wszystkie"></th>
                            <th class="w-6"></th>
                            <th class="w-32" data-sort="case_number">Nr / Znak</th>
                            <th data-sort="client">Klient</th>
                            <th data-sort="employer">Pracodawca</th>
                            <th data-sort="case_type">Typ sprawy</th>
                            <th data-sort="category">Kat.</th>
                            <th data-sort="status">Status</th>
                            <th data-sort="stage">Etap</th>
                            <th data-sort="staff">Opiekun</th>
                            <th data-sort="date_accepted">Przyjęta</th>
                            <th class="text-right" data-sort="fee_amount">Kwota</th>
                            <th class="text-right" data-sort="date_last_activity">Ostatnia akt.</th>
                        </tr>
                    </thead>
                    <tbody id="cases-tbody">
                        <tr><td colspan="11" class="p-6 text-center text-zinc-500"><span class="spinner mr-2"></span>Ładuję...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </main>
</div>

<style>.tab-btn{padding:0.4rem 0.75rem;font-size:0.8rem}.tab-btn.active{background:white;color:black}</style>
<script src="components/sidebar.js" data-active="cases"></script>
<script>
const PAGE_SIZE = 50;

const PRESETS = {
    '': {},
    'przyjete': { status: 'zlecona' },
    'aktywne': { status: 'aktywna' },
    'do-zlozenia': { stage: 'zlozenie_wniosku' },
    'osobiste': { stage: 'oczekiwanie_na_osobiste' },
    'po-osobistym': { stage: 'po_osobistym' },
    'oczek-decyzji': { stage: 'oczekiwanie_na_decyzje' },
    'odwolania': { stage: 'odwolanie' },
    'zakonczone': { status: 'zakonczona' },
};
let currentPage = 1;
let totalRows = 0;
let currentFilters = {};
let staffList = [];
let deptList = [];

document.addEventListener('gmp-auth-ready', init);

async function init() {
    // Ustaw filtry z URL query
    const params = new URLSearchParams(window.location.search);
    ['status', 'stage', 'category', 'staff', 'department', 'method', 'date-from', 'date-to', 'search'].forEach(k => {
        const v = params.get(k);
        if (v) document.getElementById('f-' + k).value = v;
    });

    await loadFilters();
    await loadCases();

    // Obsluga filtrow
    ['f-status', 'f-stage', 'f-category', 'f-staff', 'f-department', 'f-employer', 'f-method', 'f-date-from', 'f-date-to'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => { currentPage = 1; loadCases(); });
    });

    // Presety zakładek
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            const preset = b.dataset.preset;
            // Wyzeruj filtry status+stage, zastosuj preset
            document.getElementById('f-status').value = '';
            document.getElementById('f-stage').value = '';
            const p = PRESETS[preset] || {};
            if (p.status) document.getElementById('f-status').value = p.status;
            if (p.stage) document.getElementById('f-stage').value = p.stage;
            currentPage = 1;
            loadCases();
        });
    });

    // Preset z URL (np. ?preset=osobiste)
    const presetParam = params.get('preset');
    if (presetParam) {
        const btn = document.querySelector(`.tab-btn[data-preset="${presetParam}"]`);
        if (btn) btn.click();
    }

    // Select all
    document.getElementById('sel-all').addEventListener('change', (e) => {
        document.querySelectorAll('.case-chk').forEach(c => c.checked = e.target.checked);
        updateBulkBar();
    });

    // Sortowanie kolumn
    const thead = document.querySelector('.gmp-table thead');
    thead.querySelectorAll('th[data-sort]').forEach(th => {
        let dir = null;
        th.addEventListener('click', () => {
            thead.querySelectorAll('th').forEach(t => t.classList.remove('sort-asc', 'sort-desc'));
            dir = dir === 'asc' ? 'desc' : 'asc';
            th.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');
            const key = th.dataset.sort;
            const getters = {
                case_number: r => r.case_number || r.znak_sprawy || '',
                client: r => r.gmp_clients ? r.gmp_clients.last_name + ' ' + r.gmp_clients.first_name : '',
                employer: r => r.gmp_employers?.name || '',
                case_type: r => r.case_type || '',
                category: r => r.category || '',
                status: r => r.status || '',
                stage: r => r.stage || '',
                staff: r => r.gmp_staff?.full_name || '',
                date_accepted: r => r.date_accepted || '',
                fee_amount: r => Number(r.fee_amount) || 0,
                date_last_activity: r => r.date_last_activity || '',
            };
            const getter = getters[key];
            if (!getter) return;
            currentData.sort((a, b) => {
                const va = getter(a), vb = getter(b);
                if (typeof va === 'number' && typeof vb === 'number') return dir === 'asc' ? va - vb : vb - va;
                return dir === 'asc' ? String(va).localeCompare(String(vb), 'pl') : String(vb).localeCompare(String(va), 'pl');
            });
            renderRows();
        });
    });
    let searchTimer;
    document.getElementById('f-search').addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { currentPage = 1; loadCases(); }, 300);
    });
}

async function loadFilters() {
    const [{ data: staff }, { data: depts }, { data: emps }] = await Promise.all([
        db.from('gmp_staff').select('id, full_name').order('full_name'),
        db.from('gmp_office_departments').select('id, code, name').order('code'),
        db.from('gmp_employers').select('id, name').order('name').limit(1000),
    ]);
    staffList = staff || [];
    deptList = depts || [];
    const staffSel = document.getElementById('f-staff');
    staffList.forEach(s => {
        const o = document.createElement('option');
        o.value = s.id; o.textContent = s.full_name;
        staffSel.appendChild(o);
    });
    const deptSel = document.getElementById('f-department');
    deptList.forEach(d => {
        const o = document.createElement('option');
        o.value = d.id; o.textContent = d.code + (d.name ? ` — ${d.name}` : '');
        deptSel.appendChild(o);
    });
    const empSel = document.getElementById('f-employer');
    (emps || []).forEach(e => {
        const o = document.createElement('option');
        o.value = e.id; o.textContent = e.name;
        empSel.appendChild(o);
    });
}

function buildQuery() {
    let q = db.from('gmp_cases').select(
        'id, case_number, znak_sprawy, status, stage, case_type, category, submission_method, date_accepted, date_last_activity, fee_amount, assigned_to, client_id, employer_id, department_id, is_pinned, ' +
        'gmp_clients(last_name, first_name), gmp_employers(name), gmp_staff(full_name), gmp_office_departments(code)',
        { count: 'exact' }
    );

    const search = document.getElementById('f-search').value.trim();
    if (search) {
        // Szukaj w case_number, znak_sprawy albo w client imie/nazwisko
        // PostgREST ograniczenie: or() nie przejdzie przez FK, wiec robimy 2 zapytania i laczymy, albo fulltext
        // Uproszczenie: szukamy po case_number/znak_sprawy OR client name. Użyjemy .or() z ilike.
        const s = `%${search}%`;
        q = q.or(`case_number.ilike.${s},znak_sprawy.ilike.${s}`);
    }

    const status = document.getElementById('f-status').value;
    if (status) q = q.eq('status', status);

    const stage = document.getElementById('f-stage').value;
    if (stage) q = q.eq('stage', stage);

    const category = document.getElementById('f-category').value;
    if (category) q = q.eq('category', category);

    const staff = document.getElementById('f-staff').value;
    if (staff) q = q.eq('assigned_to', staff);

    const dept = document.getElementById('f-department').value;
    if (dept) q = q.eq('department_id', dept);

    const emp = document.getElementById('f-employer').value;
    if (emp) q = q.eq('employer_id', emp);

    const method = document.getElementById('f-method').value;
    if (method) q = q.eq('submission_method', method);

    const dFrom = document.getElementById('f-date-from').value;
    if (dFrom) q = q.gte('date_accepted', dFrom);

    const dTo = document.getElementById('f-date-to').value;
    if (dTo) q = q.lte('date_accepted', dTo);

    return q;
}

async function loadCases() {
    const tbody = document.getElementById('cases-tbody');
    tbody.innerHTML = '<tr><td colspan="11" class="p-6 text-center text-zinc-500"><span class="spinner mr-2"></span>Ładuję...</td></tr>';

    const search = document.getElementById('f-search').value.trim();

    // Strategia dla search po client name: najpierw znajdujemy client_id, potem filtrujemy
    let clientIdFilter = null;
    if (search && search.length >= 2) {
        const s = `%${search}%`;
        const { data: matchedClients } = await db
            .from('gmp_clients')
            .select('id')
            .or(`last_name.ilike.${s},first_name.ilike.${s}`)
            .limit(500);
        if (matchedClients?.length) {
            clientIdFilter = matchedClients.map(c => c.id);
        }
    }

    let q = buildQuery();

    // Jesli search znalazl klientow, rozszerz filter
    if (clientIdFilter?.length) {
        // Re-build query - tym razem rozszerzamy .or()
        q = db.from('gmp_cases').select(
            'id, case_number, znak_sprawy, status, stage, case_type, category, submission_method, date_accepted, date_last_activity, fee_amount, assigned_to, client_id, employer_id, department_id, ' +
            'gmp_clients(last_name, first_name), gmp_employers(name), gmp_staff(full_name), gmp_office_departments(code)',
            { count: 'exact' }
        );
        const s = `%${search}%`;
        const inList = `(${clientIdFilter.join(',')})`;
        q = q.or(`case_number.ilike.${s},znak_sprawy.ilike.${s},client_id.in.${inList}`);
        // Re-apply pozostale filtry
        const status = document.getElementById('f-status').value;
        if (status) q = q.eq('status', status);
        const stage = document.getElementById('f-stage').value;
        if (stage) q = q.eq('stage', stage);
        const category = document.getElementById('f-category').value;
        if (category) q = q.eq('category', category);
        const staff = document.getElementById('f-staff').value;
        if (staff) q = q.eq('assigned_to', staff);
        const dept = document.getElementById('f-department').value;
        if (dept) q = q.eq('department_id', dept);
        const method = document.getElementById('f-method').value;
        if (method) q = q.eq('submission_method', method);
        const dFrom = document.getElementById('f-date-from').value;
        if (dFrom) q = q.gte('date_accepted', dFrom);
        const dTo = document.getElementById('f-date-to').value;
        if (dTo) q = q.lte('date_accepted', dTo);
    }

    const from = (currentPage - 1) * PAGE_SIZE;
    const to = from + PAGE_SIZE - 1;
    q = q.order('is_pinned', { ascending: false })
         .order('date_last_activity', { ascending: false, nullsFirst: false })
         .order('created_at', { ascending: false })
         .range(from, to);

    const { data, error, count } = await q;
    if (error) {
        tbody.innerHTML = `<tr><td colspan="11" class="p-6 text-center text-red-400">Błąd: ${esc(error.message)}</td></tr>`;
        return;
    }

    totalRows = count || 0;
    document.getElementById('page-count').textContent = `${fmt.num(totalRows)} spraw`;

    if (!data?.length) {
        tbody.innerHTML = '<tr><td colspan="11" class="empty-state"><i class="ph ph-folder-open"></i><div>Brak spraw dla tych filtrów</div></td></tr>';
        renderPagination();
        return;
    }

    currentData = data;
    renderRows();
    renderPagination();
}

let currentData = [];

function renderRows() {
    const tbody = document.getElementById('cases-tbody');
    tbody.innerHTML = currentData.map(row => {
        const client = row.gmp_clients ? `${esc(row.gmp_clients.last_name)} ${esc(row.gmp_clients.first_name)}` : '<span class="text-zinc-600">—</span>';
        const employer = row.gmp_employers ? esc(row.gmp_employers.name) : '<span class="text-zinc-600">—</span>';
        const staff = row.gmp_staff?.full_name ? esc(row.gmp_staff.full_name) : '<span class="text-zinc-600">—</span>';
        const staffAva = row.gmp_staff?.full_name ? window.avatar(row.gmp_staff.full_name, 'sm') : '';
        const nr = row.case_number || (row.znak_sprawy ? row.znak_sprawy.slice(-20) : row.id.slice(0, 8));
        return `
            <tr class="clickable" data-id="${row.id}">
                <td onclick="event.stopPropagation()"><input type="checkbox" class="case-chk" value="${row.id}"></td>
                <td onclick="togglePin('${row.id}', ${row.is_pinned ? 'true' : 'false'}); event.stopPropagation();" style="cursor: pointer">
                    <i class="ph ${row.is_pinned ? 'ph-fill ph-push-pin text-amber-400' : 'ph-push-pin text-zinc-700'}" title="${row.is_pinned ? 'Odepnij' : 'Przypnij'}"></i>
                </td>
                <td class="font-mono text-xs row-nav">${esc(nr)}</td>
                <td class="row-nav">${client}</td>
                <td class="text-zinc-300 text-xs row-nav">${employer}</td>
                <td class="text-zinc-400 text-xs row-nav">${esc(row.case_type || '—')}</td>
                <td class="text-xs row-nav">${row.category ? `<span class="badge badge-category">${esc(row.category)}</span>` : ''}</td>
                <td class="row-nav"><span class="badge badge-${row.status}">${esc(row.status || '—')}</span></td>
                <td class="text-xs row-nav">${row.stage ? `<span class="badge badge-stage">${esc(row.stage)}</span>` : ''}</td>
                <td class="text-zinc-300 text-xs row-nav"><div class="flex items-center gap-2">${staffAva}<span>${staff}</span></div></td>
                <td class="text-zinc-500 text-xs row-nav">${fmt.date(row.date_accepted)}</td>
                <td class="text-right font-mono text-xs ${row.fee_amount ? 'text-emerald-300' : 'text-zinc-600'} row-nav">${row.fee_amount ? fmt.money(row.fee_amount) : '—'}</td>
                <td class="text-right text-zinc-500 text-xs row-nav">${fmt.daysAgo(row.date_last_activity)}</td>
            </tr>`;
    }).join('');

    // Navigation handlers
    tbody.querySelectorAll('tr').forEach(tr => {
        const id = tr.dataset.id;
        tr.querySelectorAll('.row-nav').forEach(td => {
            td.addEventListener('click', () => window.location.href = 'case.html?id=' + id);
        });
    });
    tbody.querySelectorAll('.case-chk').forEach(chk => {
        chk.addEventListener('change', updateBulkBar);
    });
}

async function togglePin(id, isPinned) {
    const newValue = !isPinned;
    const { error } = await db.from('gmp_cases').update({ is_pinned: newValue }).eq('id', id);
    if (error) { toast.error(error.message); return; }
    toast.success(newValue ? 'Przypięto' : 'Odpięto');
    loadCases();
}

function updateBulkBar() {
    const selected = document.querySelectorAll('.case-chk:checked');
    const bar = document.getElementById('bulk-bar');
    if (selected.length > 0) {
        bar.classList.remove('hidden');
        document.getElementById('bulk-count').textContent = selected.length;
    } else {
        bar.classList.add('hidden');
    }
}

async function bulkAssignStaff() {
    const selected = Array.from(document.querySelectorAll('.case-chk:checked')).map(c => c.value);
    if (!selected.length) return;
    const { data: staffList } = await db.from('gmp_staff').select('id, full_name').order('full_name');
    const opts = staffList.map((s, i) => `${i+1}. ${s.full_name}`).join('\n');
    const pick = prompt(`Przypisz ${selected.length} spraw do opiekuna. Wybierz numer:\n${opts}`);
    const idx = parseInt(pick) - 1;
    if (isNaN(idx) || !staffList[idx]) return;
    const { error } = await db.from('gmp_cases').update({ assigned_to: staffList[idx].id }).in('id', selected);
    if (error) { toast.error(error.message); return; }
    toast.success(`Przypisano ${selected.length} spraw do ${staffList[idx].full_name}`);
    loadCases();
}

async function bulkChangeStatus() {
    const selected = Array.from(document.querySelectorAll('.case-chk:checked')).map(c => c.value);
    if (!selected.length) return;
    const statuses = ['lead', 'zlecona', 'aktywna', 'zakonczona', 'archiwum'];
    const pick = prompt(`Zmień status ${selected.length} spraw. Wpisz:\n${statuses.join(' / ')}`);
    if (!pick || !statuses.includes(pick.trim())) return;
    const { error } = await db.from('gmp_cases').update({ status: pick.trim() }).in('id', selected);
    if (error) { toast.error(error.message); return; }
    toast.success(`Zmieniono status ${selected.length} spraw`);
    loadCases();
}

function renderPagination() {
    const totalPages = Math.ceil(totalRows / PAGE_SIZE);
    const container = document.getElementById('pagination');
    if (totalPages <= 1) { container.innerHTML = ''; return; }

    let html = `<button onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}><i class="ph ph-caret-double-left"></i></button>`;
    html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="ph ph-caret-left"></i></button>`;

    const start = Math.max(1, currentPage - 2);
    const end = Math.min(totalPages, currentPage + 2);
    if (start > 1) html += `<button onclick="goToPage(1)">1</button>${start > 2 ? '<span class="text-zinc-600 px-1">…</span>' : ''}`;
    for (let i = start; i <= end; i++) {
        html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
    }
    if (end < totalPages) html += `${end < totalPages - 1 ? '<span class="text-zinc-600 px-1">…</span>' : ''}<button onclick="goToPage(${totalPages})">${totalPages}</button>`;

    html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="ph ph-caret-right"></i></button>`;
    html += `<button onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}><i class="ph ph-caret-double-right"></i></button>`;
    html += `<span class="text-zinc-500 text-xs ml-3">Strona ${currentPage} / ${totalPages}</span>`;
    container.innerHTML = html;
}

function goToPage(p) {
    const totalPages = Math.ceil(totalRows / PAGE_SIZE);
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    loadCases();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetFilters() {
    ['f-search', 'f-status', 'f-stage', 'f-category', 'f-staff', 'f-department', 'f-employer', 'f-method', 'f-date-from', 'f-date-to']
        .forEach(id => document.getElementById(id).value = '');
    currentPage = 1;
    loadCases();
}

async function exportCSV() {
    toast.info('Eksport do CSV... (max 5000 wierszy)');
    let q = buildQuery();
    q = q.limit(5000).order('date_accepted', { ascending: false, nullsFirst: false });
    const { data, error } = await q;
    if (error) { toast.error(error.message); return; }
    if (!data?.length) { toast.warning('Brak danych do eksportu'); return; }

    const headers = ['nr_sprawy', 'znak_sprawy', 'klient', 'pracodawca', 'typ', 'kategoria', 'status', 'etap', 'opiekun', 'data_przyjecia', 'kwota', 'ostatnia_akt'];
    const rows = data.map(r => [
        r.case_number || '',
        r.znak_sprawy || '',
        r.gmp_clients ? `${r.gmp_clients.last_name} ${r.gmp_clients.first_name}` : '',
        r.gmp_employers?.name || '',
        r.case_type || '',
        r.category || '',
        r.status || '',
        r.stage || '',
        r.gmp_staff?.full_name || '',
        r.date_accepted || '',
        r.fee_amount || '',
        r.date_last_activity || '',
    ]);
    const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `sprawy_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast.success('Pobrano ' + data.length + ' wierszy');
}

function openNewCaseModal() {
    // Wybierz klienta lub dodaj nowego
    const html = `
        <div class="modal-header">Nowa sprawa<button class="btn btn-ghost btn-sm" onclick="gmpModal.close()"><i class="ph ph-x"></i></button></div>
        <div class="modal-body">
            <p class="text-zinc-400 text-sm mb-4">Wybierz klienta dla nowej sprawy:</p>
            <div class="flex gap-2 mb-4">
                <button class="btn btn-secondary flex-1" onclick="newCasePickClient()"><i class="ph ph-magnifying-glass"></i> Wyszukaj istniejącego</button>
                <button class="btn btn-secondary flex-1" onclick="newCaseNewClient()"><i class="ph ph-user-plus"></i> Nowy klient</button>
            </div>
            <div class="divider"></div>
            <button class="btn btn-ghost w-full" onclick="newCaseNoClient()">Utwórz bez klienta (dodasz później)</button>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="gmpModal.close()">Anuluj</button>
        </div>`;
    gmpModal.openModal(html);
}
async function newCasePickClient() {
    gmpModal.pickClient(async (c) => {
        await createCaseAndGo(c.id);
    });
}
async function newCaseNewClient() {
    gmpModal.editClient(null, async (c) => {
        if (!c) return;
        await createCaseAndGo(c.id);
    });
}
async function newCaseNoClient() {
    await createCaseAndGo(null);
}
async function createCaseAndGo(clientId) {
    const { data, error } = await db.from('gmp_cases').insert({
        client_id: clientId,
        status: 'lead',
        kind: 'nowa_sprawa',
        assigned_to: window.currentStaff?.id,
        date_accepted: new Date().toISOString().slice(0, 10),
        import_source: 'manual',
    }).select().single();
    if (error) { toast.error(error.message); return; }
    toast.success('Utworzono sprawę');
    window.location.href = 'case.html?id=' + data.id;
}
