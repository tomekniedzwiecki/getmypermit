<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Logowanie - GetMyPermit CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/favicon-192.png">
    <link rel="apple-touch-icon" href="img/favicon-192.png">
    <link rel="shortcut icon" href="img/favicon.ico">
    <link rel="stylesheet" href="components/layout.css">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <meta name="x-sentry-dsn" content="https://6f0737fc66f36bbdc9806377bee380b8@o4511314588205056.ingest.de.sentry.io/4511314611667024">
    <meta name="x-turnstile-site-key" content="0x4AAAAAADG9SIOSKAbZGyNT">
    <script src="components/sentry.js"></script>
    <script src="components/supabase.js"></script>
    <script src="components/auth.js" data-require-auth="false"></script>
    <script src="components/mfa.js"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body {
            background: #0a0a14;
            color: var(--text);
            min-height: 100vh;
        }

        /* Subtle ambient glow — matches CRM indigo, very restrained */
        .ambient {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(900px 600px at 50% -10%, rgba(99, 102, 241, 0.10), transparent 60%),
                radial-gradient(500px 400px at 10% 110%, rgba(99, 102, 241, 0.04), transparent 60%);
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 28px;
        }

        /* === TOP BAR — subtle brand anchor === */
        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }
        .topbar .brand img {
            display: block;
            width: 26px; height: 26px;
            flex-shrink: 0;
        }
        .topbar .brand-name {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: -0.015em;
        }
        .topbar .sep {
            width: 1px;
            height: 16px;
            background: rgba(255, 255, 255, 0.1);
        }
        .topbar .context {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.45);
            font-weight: 500;
        }

        /* === MAIN STAGE === */
        .stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }

        .auth-card {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            animation: cardIn 320ms cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === GREETING === */
        .greet { margin-bottom: 32px; }
        .greet .eyebrow {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            color: #a5b4fc;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }
        .greet h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: white;
            line-height: 1.1;
            margin-top: 12px;
        }
        .greet .sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 10px;
            line-height: 1.55;
        }

        /* === FORM === */
        .form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .field-label,
        .label-row label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }
        .label-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .label-row label { margin: 0; }

        .input-group { position: relative; }
        .input-group .ic {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 16px;
            pointer-events: none;
            transition: color 160ms;
        }
        .input-group:focus-within .ic { color: #a5b4fc; }

        .field-input {
            width: 100%;
            height: 46px;
            padding: 0 44px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 150ms, background 150ms, box-shadow 150ms;
        }
        .field-input:hover { border-color: rgba(255, 255, 255, 0.16); }
        .field-input:focus {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
        }
        .field-input::placeholder { color: rgba(255, 255, 255, 0.25); }

        .input-action {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px; height: 30px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 120ms, background 120ms;
        }
        .input-action:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .link {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-weight: 500;
            padding: 0;
            cursor: pointer;
            font-family: inherit;
            transition: color 120ms;
        }
        .link:hover { color: #a5b4fc; }

        /* Caps lock hint */
        .caps-hint {
            display: none;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            font-size: 11px;
            color: #fbbf24;
        }
        .caps-hint.show { display: inline-flex; }
        .caps-hint i { font-size: 13px; }

        /* Remember me */
        .remember {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.65);
            transition: color 120ms;
            padding-top: 2px;
        }
        .remember:hover { color: white; }
        .remember input { display: none; }
        .remember .box {
            width: 18px; height: 18px;
            border-radius: 5px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.02);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 150ms;
        }
        .remember .box i {
            font-size: 11px;
            color: white;
            opacity: 0;
            transition: opacity 100ms;
        }
        .remember input:checked + .box {
            background: #6366f1;
            border-color: #6366f1;
            box-shadow: 0 4px 12px -4px rgba(99, 102, 241, 0.6);
        }
        .remember input:checked + .box i { opacity: 1; }
        .remember:hover .box { border-color: rgba(99, 102, 241, 0.5); }

        /* Submit button */
        .btn-submit {
            width: 100%;
            height: 46px;
            border-radius: 10px;
            background: #6366f1;
            color: white;
            border: none;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.005em;
            cursor: pointer;
            transition: background 140ms, transform 120ms, box-shadow 160ms;
            font-family: inherit;
            box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.45);
            margin-top: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-submit:hover:not(:disabled) {
            background: #5856eb;
            box-shadow: 0 14px 28px -6px rgba(99, 102, 241, 0.6);
        }
        .btn-submit:active:not(:disabled) { transform: translateY(1px); }
        .btn-submit:disabled { opacity: 0.75; cursor: not-allowed; }
        .btn-submit .spinner {
            width: 14px; height: 14px;
            border-color: rgba(255, 255, 255, 0.3);
            border-top-color: white;
        }

        /* Alt auth link */
        .alt-auth {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }
        .alt-auth .alt-link {
            background: transparent;
            border: none;
            color: #a5b4fc;
            font-size: 13px;
            font-weight: 500;
            padding: 0;
            margin-left: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: color 120ms;
        }
        .alt-auth .alt-link:hover {
            color: #c7d2fe;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* Message bubble */
        .msg {
            display: none;
            margin-top: 16px;
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.5;
            align-items: flex-start;
            gap: 10px;
        }
        .msg.show { display: flex; animation: msgIn 200ms ease-out; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .msg i { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
        .msg.error   { background: rgba(239, 68, 68, 0.08);  border: 1px solid rgba(239, 68, 68, 0.25);  color: #fca5a5; }
        .msg.success { background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.25); color: #6ee7b7; }
        .msg.info    { background: rgba(99, 102, 241, 0.08); border: 1px solid rgba(99, 102, 241, 0.25); color: #a5b4fc; }

        /* Footer */
        .bottom {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px 16px 4px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.32);
            flex-wrap: wrap;
            text-align: center;
        }
        .bottom i { font-size: 13px; color: rgba(255, 255, 255, 0.25); }
        .bottom .sep { color: rgba(255, 255, 255, 0.15); }

        /* Mobile */
        @media (max-width: 480px) {
            .page { padding: 20px; }
            .greet h1 { font-size: 26px; }
            .stage { padding: 24px 0; }
        }
    </style>
</head>
<body>
    <div class="ambient"></div>

    <div class="page">
        <header class="topbar">
            <a class="brand" href="/">
                <img src="img/favicon-192.png" alt="" width="26" height="26">
                <span class="brand-name">GetMyPermit</span>
            </a>
            <span class="sep"></span>
            <span class="context">Panel kancelarii</span>
        </header>

        <main class="stage">
            <div class="auth-card">
                <div class="greet">
                    <span class="eyebrow">Zaloguj się</span>
                    <h1 id="greet-title">Witaj</h1>
                    <p class="sub">Aby kontynuować, potwierdź swoją tożsamość.</p>
                </div>

                <form id="login-form" class="form" autocomplete="on" novalidate>
                    <div>
                        <label for="email" class="field-label">Email</label>
                        <div class="input-group">
                            <i class="ph ph-envelope ic"></i>
                            <input
                                type="email" id="email" name="email"
                                class="field-input" required autocomplete="email"
                                placeholder="imie@getmypermit.pl"
                                autofocus>
                        </div>
                    </div>

                    <div>
                        <div class="label-row">
                            <label for="password">Hasło</label>
                            <button type="button" id="forgot-btn" class="link">Nie pamiętam hasła</button>
                        </div>
                        <div class="input-group">
                            <i class="ph ph-lock-simple ic"></i>
                            <input
                                type="password" id="password" name="password"
                                class="field-input" required autocomplete="current-password"
                                placeholder="••••••••">
                            <button type="button" id="toggle-pwd" class="input-action" aria-label="Pokaż hasło" tabindex="-1">
                                <i class="ph ph-eye" id="toggle-pwd-ic"></i>
                            </button>
                        </div>
                        <div id="caps-hint" class="caps-hint">
                            <i class="ph ph-arrow-fat-up"></i>
                            <span>Caps Lock jest włączony</span>
                        </div>
                    </div>

                    <label class="remember">
                        <input type="checkbox" id="remember" checked>
                        <span class="box"><i class="ph-bold ph-check"></i></span>
                        <span>Zapamiętaj mój email</span>
                    </label>

                    <!-- Cloudflare Turnstile widget (anti-bot, MAJ-PENTEST-2) -->
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAADG9SIOSKAbZGyNT" data-theme="dark" data-size="flexible"></div>

                    <button type="submit" id="login-btn" class="btn-submit">
                        <span id="login-btn-text">Zaloguj się</span>
                        <span id="login-btn-spinner" class="hidden spinner"></span>
                    </button>
                </form>

                <div class="alt-auth">
                    Wolisz bez hasła?
                    <button type="button" id="magic-link-btn" class="alt-link">
                        Wyślij mi jednorazowy link
                    </button>
                </div>

                <div id="msg" class="msg"></div>

                <!-- 2FA TOTP challenge (ukryty domyślnie, pokazuje się gdy AAL2 wymagany) -->
                <div id="mfa-challenge" style="display:none; margin-top: 24px;">
                    <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 4px;">
                        <i class="ph ph-shield-check" style="color:#a5b4fc"></i> Kod weryfikacyjny 2FA
                    </h3>
                    <p style="font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 12px;">
                        Otwórz aplikację (Authy/Google Auth) i wpisz 6-cyfrowy kod.
                    </p>
                    <input type="text" id="mfa-code" class="field-input" maxlength="6" pattern="[0-9]{6}"
                           inputmode="numeric" autocomplete="one-time-code"
                           placeholder="000000"
                           style="text-align:center; letter-spacing: 0.3em; font-family: monospace; font-size: 18px;">
                    <button type="button" id="mfa-verify-btn" class="btn-submit" style="margin-top: 12px;">
                        Zweryfikuj kod
                    </button>
                    <button type="button" id="mfa-cancel-btn" class="link" style="margin-top: 12px; display: block; text-align: center; width: 100%;">
                        Anuluj i zaloguj inne konto
                    </button>
                </div>
            </div>
        </main>

        <footer class="bottom">
            <i class="ph ph-shield-check"></i>
            <span>Dostęp wyłącznie dla pracowników kancelarii</span>
            <span class="sep">·</span>
            <span>© <span id="year"></span> GetMyPermit</span>
        </footer>
    </div>

    <script>
        // CRIT-PENTEST-1 fix: whitelist returnTo do same-origin .html
        function safeReturnTo(value, fallback) {
            fallback = fallback || 'dashboard.html';
            if (!value || typeof value !== 'string') return fallback;
            if (/^[a-z][a-z0-9+.\-]*:/i.test(value)) return fallback;
            if (value.startsWith('//') || value.startsWith('\\')) return fallback;
            let decoded;
            try { decoded = decodeURIComponent(value); } catch (_) { return fallback; }
            if (/^[a-z][a-z0-9+.\-]*:/i.test(decoded) || decoded.startsWith('//') || decoded.startsWith('\\')) return fallback;
            var cleaned = value.replace(/^\/+/, '');
            if (!/^[A-Za-z0-9_\-]+\.html(\?[A-Za-z0-9_\-=&%.]*)?(#[A-Za-z0-9_\-]*)?$/.test(cleaned)) return fallback;
            return cleaned;
        }

        // Redirect, jeśli już zalogowany
        (async () => {
            const session = await window.gmpAuth.getSession();
            if (session) {
                const params = new URLSearchParams(window.location.search);
                const returnTo = safeReturnTo(params.get('return'));
                window.location.href = returnTo;
            }
        })();

        const $ = (s) => document.querySelector(s);
        const msgEl = $('#msg');

        // Year
        $('#year').textContent = new Date().getFullYear();

        // Time-based greeting
        (function () {
            const h = new Date().getHours();
            let g;
            if (h >= 5 && h < 12)       g = 'Dzień dobry';
            else if (h >= 12 && h < 18) g = 'Dzień dobry';
            else if (h >= 18 && h < 23) g = 'Dobry wieczór';
            else                        g = 'Witaj';
            $('#greet-title').textContent = g;
        })();

        function showMsg(text, type = 'error') {
            const icon = type === 'error' ? 'ph-warning-circle'
                       : type === 'success' ? 'ph-check-circle'
                       : 'ph-info';
            msgEl.className = 'msg show ' + type;
            msgEl.innerHTML = `<i class="ph ${icon}"></i><span>${text}</span>`;
        }
        function hideMsg() { msgEl.className = 'msg'; }

        function setLoading(loading) {
            $('#login-btn').disabled = loading;
            $('#login-btn-text').classList.toggle('hidden', loading);
            $('#login-btn-spinner').classList.toggle('hidden', !loading);
        }

        // Password visibility toggle
        const pwdInput = $('#password');
        const pwdToggle = $('#toggle-pwd');
        const pwdToggleIc = $('#toggle-pwd-ic');
        pwdToggle.addEventListener('click', () => {
            const isPwd = pwdInput.type === 'password';
            pwdInput.type = isPwd ? 'text' : 'password';
            pwdToggleIc.classList.remove(isPwd ? 'ph-eye' : 'ph-eye-slash');
            pwdToggleIc.classList.add(isPwd ? 'ph-eye-slash' : 'ph-eye');
            pwdToggle.setAttribute('aria-label', isPwd ? 'Ukryj hasło' : 'Pokaż hasło');
        });

        // Caps Lock detection
        const capsHint = $('#caps-hint');
        function updateCaps(e) {
            if (document.activeElement !== pwdInput) {
                capsHint.classList.remove('show');
                return;
            }
            if (e.getModifierState && e.getModifierState('CapsLock')) capsHint.classList.add('show');
            else capsHint.classList.remove('show');
        }
        pwdInput.addEventListener('keydown', updateCaps);
        pwdInput.addEventListener('keyup', updateCaps);
        pwdInput.addEventListener('blur', () => capsHint.classList.remove('show'));

        // Remember me — prefill email
        try {
            const savedEmail = localStorage.getItem('gmp_remember_email');
            if (savedEmail) {
                $('#email').value = savedEmail;
                $('#remember').checked = true;
                setTimeout(() => pwdInput.focus(), 50);
            }
        } catch (_) {}

        $('#login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMsg();
            const email = $('#email').value.trim();
            const password = $('#password').value;

            // Cloudflare Turnstile validation - widget renderuje hidden input cf-turnstile-response
            const turnstileToken = document.querySelector('input[name="cf-turnstile-response"]')?.value;
            if (!turnstileToken) {
                showMsg('Poczekaj aż weryfikacja anty-bot się załaduje, lub odśwież stronę.');
                return;
            }

            setLoading(true);
            try {
                await window.gmpAuth.login(email, password);
                try {
                    if ($('#remember').checked) localStorage.setItem('gmp_remember_email', email);
                    else localStorage.removeItem('gmp_remember_email');
                } catch (_) {}

                // 2FA challenge - jeśli user ma TOTP i AAL=aal1, wymagamy kodu
                const needsMfa = await window.gmpMfa.needsChallenge();
                if (needsMfa) {
                    setLoading(false);
                    showMfaChallenge();
                    return;
                }

                showMsg('Zalogowano. Przekierowanie…', 'success');
                const params = new URLSearchParams(window.location.search);
                const returnTo = safeReturnTo(params.get('return'));
                setTimeout(() => window.location.href = returnTo, 400);
            } catch (err) {
                showMsg(err.message || 'Błąd logowania');
                setLoading(false);
            }
        });

        // === 2FA challenge UI ===
        function showMfaChallenge() {
            $('#login-form').style.display = 'none';
            document.querySelector('.alt-auth').style.display = 'none';
            $('#mfa-challenge').style.display = 'block';
            $('#mfa-code').focus();
        }

        function hideMfaChallenge() {
            $('#login-form').style.display = '';
            document.querySelector('.alt-auth').style.display = '';
            $('#mfa-challenge').style.display = 'none';
            $('#mfa-code').value = '';
        }

        async function submitMfaCode() {
            const code = $('#mfa-code').value.trim();
            if (!/^[0-9]{6}$/.test(code)) {
                showMsg('Wpisz dokładnie 6 cyfr');
                return;
            }
            $('#mfa-verify-btn').disabled = true;
            try {
                await window.gmpMfa.challengeAndVerify(code);
                showMsg('Zweryfikowano. Przekierowanie…', 'success');
                const params = new URLSearchParams(window.location.search);
                const returnTo = safeReturnTo(params.get('return'));
                setTimeout(() => window.location.href = returnTo, 400);
            } catch (err) {
                showMsg('Nieprawidłowy kod 2FA. Spróbuj ponownie.');
                $('#mfa-code').value = '';
                $('#mfa-code').focus();
                $('#mfa-verify-btn').disabled = false;
            }
        }

        $('#mfa-verify-btn').addEventListener('click', submitMfaCode);
        $('#mfa-code').addEventListener('input', (e) => {
            if (e.target.value.length === 6) submitMfaCode();
        });
        $('#mfa-cancel-btn').addEventListener('click', async () => {
            await window.supabaseClient.auth.signOut();
            hideMfaChallenge();
            $('#email').value = '';
            $('#password').value = '';
            $('#email').focus();
        });

        $('#magic-link-btn').addEventListener('click', async () => {
            hideMsg();
            const email = $('#email').value.trim();
            if (!email) {
                showMsg('Podaj najpierw email powyżej.');
                $('#email').focus();
                return;
            }
            try {
                await window.gmpAuth.sendMagicLink(email);
                showMsg('Link został wysłany na ' + email + '. Sprawdź skrzynkę (także SPAM).', 'success');
            } catch (err) {
                showMsg(err.message || 'Błąd wysyłania linku');
            }
        });

        $('#forgot-btn').addEventListener('click', () => {
            // Przekieruj na dedykowana strone (prefill emaila jesli jest wpisany)
            const email = $('#email').value.trim();
            const q = email ? '?email=' + encodeURIComponent(email) : '';
            window.location.href = 'forgot-password.html' + q;
        });
    </script>
</body>
</html>
