<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kalendarz - GetMyPermit CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/favicon-192.png">
    <link rel="apple-touch-icon" href="img/favicon-192.png">
    <link rel="shortcut icon" href="img/favicon.ico">
    <link rel="stylesheet" href="components/layout.css">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], mono: ['JetBrains Mono','monospace'] } } } }</script>
    <script src="components/supabase.js"></script>
    <script src="components/auth.js"></script>
</head>
<body>
<div class="app-layout">
    <div id="sidebar-placeholder"></div>
    <main class="app-main">
        <div class="page-header">
            <div>
                <h1 class="page-title">Kalendarz</h1>
                <p class="page-subtitle">Spotkania, osobiste stawiennictwa, terminy</p>
            </div>
            <div class="flex gap-2">
                <button class="btn btn-secondary" id="prev-week"><i class="ph ph-caret-left"></i></button>
                <button class="btn btn-secondary" id="today-btn">Dziś</button>
                <button class="btn btn-secondary" id="next-week"><i class="ph ph-caret-right"></i></button>
            </div>
        </div>

        <div class="flex gap-1 mb-4 items-center flex-wrap">
            <button class="btn btn-secondary tab-btn active" data-type="">Wszystkie</button>
            <button class="btn btn-secondary tab-btn" data-type="konsultacja">Konsultacje</button>
            <button class="btn btn-secondary tab-btn" data-type="osobiste_odciski">Odciski</button>
            <button class="btn btn-secondary tab-btn" data-type="osobiste_inne">Inne stawiennictwa</button>
            <div class="flex-1"></div>
            <label class="flex items-center gap-2 text-xs text-zinc-400 cursor-pointer">
                <input type="checkbox" id="only-mine-toggle"> Tylko moje
            </label>
        </div>

        <!-- Widok kalendarzowy tygodniowy -->
        <div class="card overflow-hidden">
            <div class="card-header" id="week-header">Tydzień ...</div>
            <div class="grid grid-cols-7 border-b border-zinc-900" id="calendar-grid">
                <!-- dni -->
            </div>
        </div>

        <!-- Lista odcisków do pokazania -->
        <section class="card mt-4">
            <div class="card-header flex items-center justify-between">
                <span><i class="ph ph-fingerprint text-cyan-400 mr-2"></i>Nadchodzące odciski (14 dni)</span>
                <a href="submissions.html" class="text-xs text-zinc-500 hover:text-white">Kolejka wniosków →</a>
            </div>
            <div id="odciski-list" class="divide-y divide-zinc-900/50">
                <div class="p-4 text-zinc-500 text-sm">Ładuję...</div>
            </div>
        </section>
    </main>
</div>

<style>
.tab-btn { padding: 0.4rem 0.75rem; font-size: 0.8rem; }
.tab-btn.active { background: white; color: black; }
.cal-day { min-height: 200px; border-right: 1px solid rgba(255,255,255,0.04); padding: 0.5rem; }
.cal-day:last-child { border-right: none; }
.cal-day-header { font-size: 0.7rem; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 0.35rem; }
.cal-day-header.today { color: #3b82f6; }
.cal-event { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 0.375rem; padding: 0.35rem 0.5rem; margin-bottom: 0.35rem; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
.cal-event:hover { background: rgba(59, 130, 246, 0.2); }
.cal-event.odciski { background: rgba(6, 182, 212, 0.1); border-color: rgba(6, 182, 212, 0.3); }
.cal-event.konsultacja { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.3); }
.cal-event.task { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3); }

/* Day header labels — desktop pokazuje krótką, mobile pokazuje pełną nazwę dnia */
.cal-lbl-desktop { display: inline; }
.cal-lbl-mobile { display: none; }
@media (max-width: 600px) {
    .cal-lbl-desktop { display: none; }
    .cal-lbl-mobile { display: inline; }
}

/* === MOBILE calendar === */
@media (max-width: 900px) {
    /* Navigacja prev/next/today — większe touch targets */
    .page-header .btn { min-height: 44px; min-width: 44px; }
}
@media (max-width: 600px) {
    #calendar-grid {
        display: flex !important;
        flex-direction: column !important;
    }
    .cal-day {
        min-height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 12px 14px;
        /* Ukryj puste dni żeby nie zasłaniały wizji */
    }
    .cal-day.empty-mobile {
        padding: 8px 14px;
        min-height: 0;
    }
    .cal-day.empty-mobile .cal-day-header { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .cal-day.empty-mobile > div:not(.cal-day-header) { display: none; }
    /* Nagłówek dnia — sticky żeby user zawsze widział którego dnia patrzy scroll */
    .cal-day-header {
        text-align: left;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 10px;
        padding-bottom: 6px;
        color: var(--text);
        position: sticky;
        top: 52px;
        background: var(--bg-elevated);
        z-index: 2;
        margin-left: -14px; margin-right: -14px;
        padding-left: 14px; padding-right: 14px; padding-top: 8px;
    }
    .cal-day-header.today {
        color: var(--accent);
        border-left: 3px solid var(--accent);
        padding-left: 11px;
    }
    /* Event — większy, touch-friendly */
    .cal-event {
        font-size: 13px;
        padding: 12px 12px;
        min-height: 56px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: var(--r-md);
        margin-bottom: 8px;
    }
    .cal-event > span:first-child { flex-shrink: 0; font-weight: 600; }
    /* Filtr tabs (Wszystkie/Konsultacje/Odciski) — overflow horizontal */
    .flex.gap-1.mb-4 {
        overflow-x: auto;
        flex-wrap: nowrap !important;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 4px;
    }
    .flex.gap-1.mb-4::-webkit-scrollbar { display: none; }
    .flex.gap-1.mb-4 .tab-btn { flex-shrink: 0; min-height: 40px; padding: 8px 14px; }
    /* "Tylko moje" checkbox — w osobnym wierszu żeby nie ściskać przycisków */
    label.flex.items-center.gap-2.text-xs {
        width: 100%;
        padding: 8px 12px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        margin-top: 8px;
        font-size: 13px !important;
    }
    /* Nadchodzące odciski — lepsza czytelność na mobile */
    #odciski-list a { min-height: 60px; padding: 14px 14px !important; }
}
</style>

<script src="components/sidebar.js" data-active="appointments"></script>
<script>
let currentWeekStart = new Date();
currentWeekStart.setHours(0,0,0,0);
// Poczatek tygodnia - poniedzialek
while (currentWeekStart.getDay() !== 1) currentWeekStart.setDate(currentWeekStart.getDate() - 1);

let typeFilter = '';
let onlyMine = false;

document.addEventListener('gmp-auth-ready', init);

async function init() {
    document.getElementById('prev-week').addEventListener('click', () => shiftWeek(-7));
    document.getElementById('next-week').addEventListener('click', () => shiftWeek(7));
    document.getElementById('today-btn').addEventListener('click', () => {
        currentWeekStart = new Date(); currentWeekStart.setHours(0,0,0,0);
        while (currentWeekStart.getDay() !== 1) currentWeekStart.setDate(currentWeekStart.getDate() - 1);
        renderWeek();
    });
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            typeFilter = b.dataset.type;
            renderWeek();
        });
    });
    // Persist "tylko moje" w localStorage (prefix user_id — zapobiega wyciekom między użytkownikami tego samego urządzenia)
    const lsKey = `gmp_cal_only_mine_${window.currentStaff?.id || 'anon'}`;
    onlyMine = localStorage.getItem(lsKey) === '1';
    document.getElementById('only-mine-toggle').checked = onlyMine;
    document.getElementById('only-mine-toggle').addEventListener('change', (e) => {
        onlyMine = e.target.checked;
        localStorage.setItem(lsKey, onlyMine ? '1' : '0');
        renderWeek();
    });

    renderWeek();
    loadOdciski();
}

function shiftWeek(days) {
    currentWeekStart.setDate(currentWeekStart.getDate() + days);
    renderWeek();
}

async function renderWeek() {
    const end = new Date(currentWeekStart); end.setDate(end.getDate() + 7);
    const fmtLong = (d) => d.toLocaleDateString('pl-PL', { day: '2-digit', month: 'long' });
    document.getElementById('week-header').textContent =
        `${fmtLong(currentWeekStart)} - ${fmtLong(new Date(end.getTime() - 86400000))} ${end.getFullYear()}`;

    // Pobierz eventy z gmp_crm_appointments + submissions_queue + gmp_tasks (show_in_calendar)
    const myStaffId = window.currentStaff?.id;
    let appointmentsQuery = db.from('gmp_crm_appointments')
        .select('id, appointment_type, scheduled_date, scheduled_time, client_id, case_id, staff_id, title, notes, transport_type, contact_name, gmp_clients(last_name, first_name), gmp_staff!staff_id(full_name)')
        .gte('scheduled_date', currentWeekStart.toISOString().slice(0,10))
        .lt('scheduled_date', end.toISOString().slice(0,10));
    if (typeFilter) appointmentsQuery = appointmentsQuery.eq('appointment_type', typeFilter);
    if (onlyMine && myStaffId) appointmentsQuery = appointmentsQuery.eq('staff_id', myStaffId);

    // Zadania z show_in_calendar = true + respekt visibility (private widoczne tylko dla created_by)
    let tasksQuery = db.from('gmp_tasks')
        .select('id, title, description, due_date, task_type, visibility, show_in_calendar, assigned_to, case_id, created_by, gmp_cases(case_number, gmp_clients(last_name, first_name)), gmp_staff!assigned_to(full_name)')
        .eq('show_in_calendar', true)
        .not('due_date', 'is', null)
        .gte('due_date', currentWeekStart.toISOString().slice(0,10))
        .lt('due_date', end.toISOString().slice(0,10))
        .neq('status', 'done');
    if (onlyMine && myStaffId) tasksQuery = tasksQuery.eq('assigned_to', myStaffId);

    const [{ data: appts }, { data: subs }, { data: tasks }] = await Promise.all([
        appointmentsQuery,
        db.from('gmp_submissions_queue')
            .select('id, scheduled_at, client_id, office_id, mos_number, gmp_clients(last_name, first_name), gmp_offices(city, code)')
            .gte('scheduled_at', currentWeekStart.toISOString())
            .lt('scheduled_at', end.toISOString())
            .not('scheduled_at', 'is', null),
        tasksQuery,
    ]);

    // Filtr widoczności: private tylko dla created_by
    const visibleTasks = (tasks || []).filter(t =>
        t.visibility !== 'private' || t.created_by === myStaffId
    );

    // Grupuj po dniu
    const byDay = {};
    for (let i = 0; i < 7; i++) {
        const d = new Date(currentWeekStart); d.setDate(d.getDate() + i);
        byDay[d.toISOString().slice(0,10)] = [];
    }

    (appts || []).forEach(a => {
        const day = a.scheduled_date;
        if (byDay[day] !== undefined) {
            const client = a.gmp_clients ? `${a.gmp_clients.last_name} ${a.gmp_clients.first_name}` : (a.contact_name || a.title || '—');
            byDay[day].push({
                type: a.appointment_type || 'konsultacja',
                time: a.scheduled_time || '',
                title: client,
                subtitle: a.transport_type || a.title || '',
                href: a.case_id ? `case.html?id=${a.case_id}` : (a.client_id ? `clients.html?id=${a.client_id}` : '#'),
            });
        }
    });
    (subs || []).forEach(s => {
        const day = s.scheduled_at.slice(0, 10);
        if (byDay[day] !== undefined) {
            const client = s.gmp_clients ? `${s.gmp_clients.last_name} ${s.gmp_clients.first_name}` : '—';
            const time = s.scheduled_at.slice(11, 16);
            byDay[day].push({
                type: 'odciski',
                time,
                title: client,
                subtitle: s.gmp_offices?.city || s.gmp_offices?.code || 'Wniosek',
                href: s.client_id ? `clients.html?id=${s.client_id}` : '#',
            });
        }
    });
    visibleTasks.forEach(t => {
        const day = t.due_date;
        if (byDay[day] !== undefined) {
            const client = t.gmp_cases?.gmp_clients ? `${t.gmp_cases.gmp_clients.last_name} ${t.gmp_cases.gmp_clients.first_name}` : '';
            byDay[day].push({
                type: 'task',
                time: '',
                title: t.title,
                isPrivate: t.visibility === 'private',
                subtitle: [client, t.gmp_staff?.full_name].filter(Boolean).join(' · '),
                href: t.case_id ? `case.html?id=${t.case_id}` : '#',
            });
        }
    });

    const today = new Date(); today.setHours(0,0,0,0);
    const weekdays = ['Pn', 'Wt', 'Śr', 'Cz', 'Pt', 'Sb', 'Nd'];
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';
    const monthNames = ['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];
    const fullDays = ['Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota','Niedziela'];
    for (let i = 0; i < 7; i++) {
        const d = new Date(currentWeekStart); d.setDate(d.getDate() + i);
        const key = d.toISOString().slice(0,10);
        const isToday = d.getTime() === today.getTime();
        const events = byDay[key].sort((a, b) => (a.time || '').localeCompare(b.time || ''));
        const cell = document.createElement('div');
        // Oznacz puste dni klasą 'empty-mobile' — na mobile CSS je zwinie do samej etykiety
        cell.className = 'cal-day' + (events.length === 0 ? ' empty-mobile' : '');
        // Tytuł: "Pn 21.4" na desktop, "Poniedziałek 21 kwietnia" na mobile — renderuję oba
        const desktopLabel = `${weekdays[i]} ${d.getDate()}.${d.getMonth()+1}`;
        const mobileLabel = `<span class="cal-lbl-desktop">${desktopLabel}</span><span class="cal-lbl-mobile">${fullDays[i]} ${d.getDate()} ${monthNames[d.getMonth()]}${isToday ? ' · DZIŚ' : ''}</span>`;
        cell.innerHTML = `
            <div class="cal-day-header ${isToday ? 'today' : ''}">${mobileLabel}</div>
            ${events.length === 0 ? '<div class="text-zinc-700 text-xs text-center pt-8">—</div>' : ''}
            ${events.map(e => `
                <a href="${e.href}" class="block">
                    <div class="cal-event ${e.type}">
                        ${e.time ? `<span class="font-mono text-zinc-300">${e.time}</span> ` : ''}${e.isPrivate ? '<i class="ph ph-lock text-zinc-500 mr-0.5" title="Prywatne"></i>' : ''}<span>${esc(e.title)}</span>
                        ${e.subtitle ? `<div class="text-zinc-500 text-[10px] mt-0.5">${esc(e.subtitle)}</div>` : ''}
                    </div>
                </a>`).join('')}`;
        grid.appendChild(cell);
    }
}

async function loadOdciski() {
    const now = new Date().toISOString();
    const in14 = new Date(Date.now() + 14 * 86400000).toISOString();
    const { data } = await db.from('gmp_submissions_queue')
        .select('id, scheduled_at, client_id, gmp_clients(last_name, first_name, nationality), gmp_offices(city, code), transport_type, notes')
        .gte('scheduled_at', now)
        .lt('scheduled_at', in14)
        .eq('status', 'pending')
        .order('scheduled_at', { ascending: true })
        .limit(30);

    const el = document.getElementById('odciski-list');
    if (!data?.length) { el.innerHTML = '<div class="p-4 text-zinc-500 text-sm">Brak najbliższych odcisków</div>'; return; }
    el.innerHTML = data.map(d => {
        const client = d.gmp_clients ? `${esc(d.gmp_clients.last_name)} ${esc(d.gmp_clients.first_name)}` : '—';
        const nat = d.gmp_clients?.nationality ? `<span class="text-zinc-500 text-xs"> ${esc(d.gmp_clients.nationality)}</span>` : '';
        const office = d.gmp_offices?.city || d.gmp_offices?.code || '';
        return `
            <a href="${d.client_id ? 'clients.html?id=' + d.client_id : '#'}" class="block p-3 hover:bg-zinc-900/50">
                <div class="flex items-center justify-between gap-3">
                    <div class="flex-1 min-w-0">
                        <div class="text-sm text-white">${client}${nat}</div>
                        <div class="text-xs text-zinc-500">${esc(office)}${d.transport_type ? ' • ' + esc(d.transport_type) : ''}${d.notes ? ' • ' + esc(d.notes.slice(0, 60)) : ''}</div>
                    </div>
                    <div class="text-xs text-zinc-300 font-mono">${fmt.datetime(d.scheduled_at)}</div>
                </div>
            </a>`;
    }).join('');
}
</script>
</body>
</html>
