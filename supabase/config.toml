project_id = "gfwsdrbywgmceateubyq"

[auth]
enabled = true
site_url = "https://crm.getmypermit.pl"
additional_redirect_urls = [
  "https://crm.getmypermit.pl/**",
  "https://getmypermit.vercel.app/**",
  "http://127.0.0.1:5500/**",
  "http://localhost:5500/**",
  "http://localhost:3000/**"
]
jwt_expiry = 3600
enable_signup = false

# Zachowujemy obecne ustawienia email z remote (inaczej CLI je zmieni na defaulty)
[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600
